name: Release Desktop

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      target:
        description: Build one test target (macOS app is ad-hoc signed)
        required: true
        default: macos-aarch64
        type: choice
        options:
          - macos-aarch64
          - macos-x64
          - windows-x64
          - linux-x64

permissions:
  contents: read

jobs:
  validate-release:
    name: Validate release contract
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Require official tag commit on main
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        run: |
          set -euo pipefail
          if ! git merge-base --is-ancestor "$GITHUB_SHA" refs/remotes/origin/main; then
            echo "::error::official release tag $GITHUB_REF_NAME is not reachable from origin/main"
            exit 1
          fi

      - name: Require Apple credentials for an official tag
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          missing=()
          [[ -n "$APPLE_CERTIFICATE" ]] || missing+=("APPLE_CERTIFICATE")
          [[ -n "$APPLE_CERTIFICATE_PASSWORD" ]] || missing+=("APPLE_CERTIFICATE_PASSWORD")
          [[ -n "$APPLE_ID" ]] || missing+=("APPLE_ID")
          [[ -n "$APPLE_PASSWORD" ]] || missing+=("APPLE_PASSWORD")
          [[ -n "$APPLE_TEAM_ID" ]] || missing+=("APPLE_TEAM_ID")
          if (( ${#missing[@]} > 0 )); then
            echo "::error::official tags require Apple credentials: ${missing[*]}"
            exit 1
          fi

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12.13"

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable 2026-06-30
        with:
          toolchain: "1.96.1"
          components: clippy

      - name: Install validation dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev pkg-config libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev libxdo-dev libssl-dev
          npm ci
          npm --prefix frontend ci --legacy-peer-deps
          npm --prefix desktop-tauri ci
          python -m pip install --require-hashes --only-binary=cryptography -r backend/requirements.txt
          python -m pip install -e ./backend --no-deps
          python -m pip install pytest==9.1.1 pytest-asyncio==1.4.0 pip-audit==2.10.1

      - name: Install Chromium validation runtime
        run: |
          cd frontend
          npx playwright install --with-deps chromium

      - name: Validate metadata and workflow contracts
        run: |
          set -euo pipefail
          if [[ "$GITHUB_EVENT_NAME" == "push" ]]; then
            EXPECTED_VERSION="${GITHUB_REF_NAME#v}"
          else
            EXPECTED_VERSION="$(node -p "require('./package.json').version")"
          fi
          node scripts/release-metadata.mjs "$EXPECTED_VERSION"
          node --test scripts/*.test.mjs

      - name: Audit and test frontend production graph
        run: |
          cd frontend
          npm audit --omit=dev
          npx tsc --noEmit
          npm run lint
          node --test tests/unit/*.test.ts
          npm run test:ui:core

      - name: Audit and test backend production graph
        run: |
          cd backend
          python -m pip check
          pip-audit -r requirements.txt
          pytest -q

      - name: Prepare placeholder Tauri resources for Rust validation
        working-directory: desktop-tauri/src-tauri
        run: |
          mkdir -p \
            ../../backend/dist/suxiaoyou-backend \
            ../../backend/resources/nodejs

      - name: Validate Rust desktop graph
        run: |
          cargo metadata --locked --format-version 1 >/dev/null
          cargo test --locked
          cargo clippy --locked --all-targets -- -D warnings
        working-directory: desktop-tauri/src-tauri

  build-windows:
    name: Build Windows x64
    needs: validate-release
    if: github.event_name == 'push' || inputs.target == 'windows-x64'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          # CPython 3.12.10 is the final 3.12 release with an official
          # Windows binary; later 3.12 security releases are source-only.
          python-version: "3.12.10"

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable 2026-06-30
        with:
          toolchain: "1.96.1"

      - name: Install locked JavaScript dependencies
        run: |
          npm ci
          npm --prefix frontend ci --legacy-peer-deps
          npm --prefix desktop-tauri ci

      - name: Build and sanitize frontend
        run: npm run build:frontend

      - name: Build backend with locked PyInstaller
        run: |
          python -m pip install --require-hashes --only-binary=cryptography -r backend/requirements.txt
          python -m pip install pyinstaller==6.21.0 pytest==9.1.1
          python -m pytest -q backend/tests/test_run.py backend/tests/test_scripts/test_download_node.py
          cd backend
          python -m PyInstaller suxiaoyou.spec --noconfirm

      - name: Verify backend bundle
        run: node scripts/verify-bundle.mjs backend/dist/suxiaoyou-backend

      - name: Download verified Node.js runtime
        run: |
          cd backend
          python scripts/download_node.py

      - name: Verify bundled Node.js toolchain
        run: node scripts/verify-node-runtime.mjs backend/resources/nodejs

      - name: Build Tauri NSIS installer
        shell: bash
        run: |
          cd desktop-tauri
          npm exec tauri build -- --config src-tauri/build.windows.json --no-sign

      - name: Verify Windows artifact completeness
        shell: bash
        run: |
          shopt -s nullglob
          installers=(desktop-tauri/src-tauri/target/release/bundle/nsis/*.exe)
          [[ ${#installers[@]} -eq 1 ]]

      - name: Install NSIS package and verify packaged Node.js toolchain
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $installer = @(Get-ChildItem "desktop-tauri/src-tauri/target/release/bundle/nsis/*.exe")
          if ($installer.Count -ne 1) {
            throw "Expected exactly one NSIS installer, found $($installer.Count)"
          }
          $expectedVersion = (& node -p "require('./package.json').version").Trim()
          if ($installer[0].Name -notmatch [regex]::Escape($expectedVersion)) {
            throw "NSIS installer name does not contain version ${expectedVersion}: $($installer[0].Name)"
          }

          $installDirectory = Join-Path $env:RUNNER_TEMP "suxiaoyou-nsis-install"
          Remove-Item -Recurse -Force $installDirectory -ErrorAction SilentlyContinue
          $process = Start-Process `
            -FilePath $installer[0].FullName `
            -ArgumentList @("/S", "/D=$installDirectory") `
            -Wait `
            -PassThru
          if ($process.ExitCode -ne 0) {
            throw "NSIS installer exited with code $($process.ExitCode)"
          }

          $appBinaries = @(Get-ChildItem $installDirectory -Recurse -File -Filter "苏小有.exe")
          if ($appBinaries.Count -ne 1) {
            throw "Expected one installed 苏小有.exe, found $($appBinaries.Count)"
          }
          $productVersion = $appBinaries[0].VersionInfo.ProductVersion
          $expectedVersionPattern = "^$([regex]::Escape($expectedVersion))(?:\.0+)?$"
          if ($productVersion -notmatch $expectedVersionPattern) {
            throw "Installed app version is $productVersion, expected $expectedVersion"
          }

          $nodeBinaries = @(
            Get-ChildItem $installDirectory -Recurse -File -Filter node.exe |
              Where-Object { $_.FullName -match '[\\/]nodejs[\\/]node\.exe$' }
          )
          if ($nodeBinaries.Count -ne 1) {
            throw "Expected one packaged node.exe, found $($nodeBinaries.Count)"
          }
          $nodeRuntime = $nodeBinaries[0].Directory.FullName
          node scripts/verify-node-runtime.mjs $nodeRuntime
          foreach ($launcher in @("npm.cmd", "npx.cmd")) {
            & (Join-Path $nodeRuntime $launcher) --version
            if ($LASTEXITCODE -ne 0) {
              throw "Packaged $launcher exited with code $LASTEXITCODE"
            }
          }

          $backendBinaries = @(
            Get-ChildItem $installDirectory -Recurse -File -Filter suxiaoyou-backend.exe |
              Where-Object { $_.FullName -match '[\\/]backend[\\/]suxiaoyou-backend\.exe$' }
          )
          if ($backendBinaries.Count -ne 1) {
            throw "Expected one packaged suxiaoyou-backend.exe, found $($backendBinaries.Count)"
          }
          node scripts/verify-bundle.mjs $backendBinaries[0].Directory.FullName

      - name: Launch installed Windows desktop and verify clean shutdown
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $installDirectory = Join-Path $env:RUNNER_TEMP "suxiaoyou-nsis-install"
          $appBinaries = @(Get-ChildItem $installDirectory -Recurse -File -Filter "苏小有.exe")
          if ($appBinaries.Count -ne 1) {
            throw "Expected one installed 苏小有.exe, found $($appBinaries.Count)"
          }
          node scripts/verify-desktop-lifecycle.mjs `
            --executable $($appBinaries[0].FullName) `
            --work-dir (Join-Path $env:RUNNER_TEMP "suxiaoyou-desktop-lifecycle-windows")
          if ($LASTEXITCODE -ne 0) {
            throw "Installed Windows desktop lifecycle smoke failed with code $LASTEXITCODE"
          }

      - name: Upload Windows lifecycle diagnostics
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: windows-lifecycle-diagnostics-${{ github.run_attempt }}
          path: ${{ runner.temp }}/suxiaoyou-desktop-lifecycle-windows
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload Windows artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: windows-${{ github.event_name == 'workflow_dispatch' && 'UNSIGNED-TEST' || 'release' }}
          path: desktop-tauri/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
          retention-days: 1

  build-macos:
    name: Build macOS ${{ matrix.target == 'aarch64-apple-darwin' && 'aarch64' || 'x64' }}
    needs: validate-release
    if: >-
      github.event_name == 'push' ||
      inputs.target == 'macos-aarch64' ||
      inputs.target == 'macos-x64'
    runs-on: ${{ matrix.target == 'aarch64-apple-darwin' && 'macos-14' || 'macos-15-intel' }}
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJSON(github.event_name == 'push' && '["aarch64-apple-darwin","x86_64-apple-darwin"]' || inputs.target == 'macos-aarch64' && '["aarch64-apple-darwin"]' || '["x86_64-apple-darwin"]') }}
    env:
      MACOSX_DEPLOYMENT_TARGET: "11.0"
      BUNDLE_ARCH: ${{ matrix.target == 'aarch64-apple-darwin' && 'arm64' || 'x86_64' }}
      DMG_ARCH: ${{ matrix.target == 'aarch64-apple-darwin' && 'aarch64' || 'x64' }}
      NODE_PLATFORM: ${{ matrix.target == 'aarch64-apple-darwin' && 'Darwin-arm64' || 'Darwin-x86_64' }}
      BACKEND_DIST: dist
      BUILD_CONFIG: ${{ matrix.target == 'aarch64-apple-darwin' && 'src-tauri/build.macos-aarch64.json' || 'src-tauri/build.macos-x64.json' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.28"
          enable-cache: false

      - name: Install portable macOS Python 3.12.13
        shell: bash
        run: |
          set -euo pipefail
          PYTHON_ENV="$RUNNER_TEMP/suxiaoyou-python"
          uv venv --python 3.12.13 --managed-python --seed "$PYTHON_ENV"
          [[ "$("$PYTHON_ENV/bin/python" -c 'import platform; print(platform.machine())')" == "$BUNDLE_ARCH" ]]
          [[ "$("$PYTHON_ENV/bin/python" -c 'import sys; print(".".join(map(str, sys.version_info[:3])))')" == "3.12.13" ]]
          echo "$PYTHON_ENV/bin" >> "$GITHUB_PATH"

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable 2026-06-30
        with:
          toolchain: "1.96.1"
          targets: ${{ matrix.target }}

      - name: Install locked JavaScript dependencies
        run: |
          npm ci
          npm --prefix frontend ci --legacy-peer-deps
          npm --prefix desktop-tauri ci

      - name: Build and sanitize frontend
        run: npm run build:frontend

      - name: Build native backend with locked PyInstaller
        run: |
          python -m pip install --require-hashes --only-binary=cryptography -r backend/requirements.txt
          python -m pip install pyinstaller==6.21.0
          cd backend
          python -m PyInstaller suxiaoyou.spec --noconfirm --distpath "$BACKEND_DIST" --workpath "build-$BUNDLE_ARCH"

      - name: Verify backend bundle with full smoke
        run: node scripts/verify-bundle.mjs "backend/$BACKEND_DIST/suxiaoyou-backend"

      - name: Download verified native Node.js runtime
        run: |
          cd backend
          python scripts/download_node.py --platform "$NODE_PLATFORM"

      - name: Verify bundled Node.js toolchain
        run: node scripts/verify-node-runtime.mjs backend/resources/nodejs

      - name: Build Tauri app for post-copy repair
        run: |
          cd desktop-tauri
          npm exec tauri build -- --target ${{ matrix.target }} --config "$BUILD_CONFIG" --bundles app --no-sign

      - name: Repair Python.framework symlinks
        run: |
          set -euo pipefail
          APP_PATH="desktop-tauri/src-tauri/target/${{ matrix.target }}/release/bundle/macos/苏小有.app"
          BUNDLE_BACKEND="$APP_PATH/Contents/Resources/backend"
          FRAMEWORK="$BUNDLE_BACKEND/_internal/Python.framework"

          if [[ -d "$FRAMEWORK" ]]; then
            VERSION_DIRECTORY="$(find "$FRAMEWORK/Versions" -mindepth 1 -maxdepth 1 -type d ! -name Current -print -quit)"
            if [[ -z "$VERSION_DIRECTORY" ]]; then
              echo "::error::Python.framework has no versioned directory"
              exit 1
            fi
            VERSION_NAME="$(basename "$VERSION_DIRECTORY")"
            rm -rf "$FRAMEWORK/Versions/Current"
            ln -s "$VERSION_NAME" "$FRAMEWORK/Versions/Current"
            for entry in Python Resources Headers; do
              if [[ -e "$VERSION_DIRECTORY/$entry" ]]; then
                rm -rf "$FRAMEWORK/$entry"
                ln -s "Versions/Current/$entry" "$FRAMEWORK/$entry"
              fi
            done
            rm -rf "$FRAMEWORK/_CodeSignature"
          fi

          PYTHON_BINARY="$BUNDLE_BACKEND/_internal/Python"
          if [[ -e "$FRAMEWORK/Versions/Current/Python" ]]; then
            rm -rf "$PYTHON_BINARY"
            ln -s Python.framework/Versions/Current/Python "$PYTHON_BINARY"
          fi

      - name: Verify repaired app before signing
        run: |
          APP_PATH="desktop-tauri/src-tauri/target/${{ matrix.target }}/release/bundle/macos/苏小有.app"
          node scripts/verify-macos-bundle.mjs "$APP_PATH" "$BUNDLE_ARCH" 11.0

      - name: Import Apple certificate and discover signing identity
        id: apple-signing
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          CERTIFICATE_PATH="$RUNNER_TEMP/apple-certificate.p12"

          printf '%s' "$APPLE_CERTIFICATE" | base64 --decode > "$CERTIFICATE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"

          SIGNING_IDENTITY="$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" |
            awk -F'"' '$2 ~ /^Developer ID Application:/ { print $2; exit }')"
          if [[ -z "$SIGNING_IDENTITY" ]]; then
            echo "::error::the imported certificate contains no Developer ID Application identity"
            exit 1
          fi
          echo "identity=$SIGNING_IDENTITY" >> "$GITHUB_OUTPUT"

      - name: Sign nested Mach-O files and app
        env:
          DEVELOPER_IDENTITY: ${{ steps.apple-signing.outputs.identity }}
        run: |
          set -euo pipefail
          APP_PATH="desktop-tauri/src-tauri/target/${{ matrix.target }}/release/bundle/macos/苏小有.app"
          BACKEND_BINARY="$APP_PATH/Contents/Resources/backend/suxiaoyou-backend"
          BACKEND_ADHOC_ENTITLEMENTS="desktop-tauri/src-tauri/entitlements.backend-adhoc.plist"
          NODE_BINARY="$APP_PATH/Contents/Resources/nodejs/bin/node"
          NODE_ENTITLEMENTS="desktop-tauri/src-tauri/entitlements.node.plist"
          SIGNED_BACKEND_ENTITLEMENTS="$RUNNER_TEMP/signed-backend-entitlements.plist"
          SIGNED_NODE_ENTITLEMENTS="$RUNNER_TEMP/signed-node-entitlements.plist"
          MACHO_LIST="$RUNNER_TEMP/macho-files.txt"

          if [[ "$GITHUB_EVENT_NAME" == "push" && "$GITHUB_REF" == refs/tags/* ]]; then
            [[ -n "$DEVELOPER_IDENTITY" ]]
            SIGNING_IDENTITY="$DEVELOPER_IDENTITY"
            SIGN_ARGS=(--force --options runtime --timestamp --sign "$SIGNING_IDENTITY")
          else
            SIGNING_IDENTITY="-"
            SIGN_ARGS=(--force --options runtime --sign -)
          fi

          python3 - "$APP_PATH" "$MACHO_LIST" <<'PY'
          import os
          import sys

          root, output = sys.argv[1:]
          paths = []
          for directory, _subdirectories, filenames in os.walk(root):
              for filename in filenames:
                  path = os.path.join(directory, filename)
                  if os.path.isfile(path) and not os.path.islink(path):
                      paths.append(path)
          paths.sort(key=lambda path: (path.count(os.sep), path), reverse=True)
          with open(output, "w", encoding="utf-8") as handle:
              handle.write("\n".join(paths))
              handle.write("\n")
          PY

          while IFS= read -r candidate; do
            if file -b "$candidate" | grep -q "Mach-O"; then
              if [[ "$candidate" == "$NODE_BINARY" ]]; then
                codesign "${SIGN_ARGS[@]}" --entitlements "$NODE_ENTITLEMENTS" "$candidate"
              elif [[ "$SIGNING_IDENTITY" == "-" && "$candidate" == "$BACKEND_BINARY" ]]; then
                codesign "${SIGN_ARGS[@]}" --entitlements "$BACKEND_ADHOC_ENTITLEMENTS" "$candidate"
              else
                codesign "${SIGN_ARGS[@]}" "$candidate"
              fi
            fi
          done < "$MACHO_LIST"

          while IFS= read -r -d '' framework; do
            codesign "${SIGN_ARGS[@]}" "$framework"
          done < <(find "$APP_PATH" -type d -name '*.framework' -print0)

          codesign "${SIGN_ARGS[@]}" "$APP_PATH"

          codesign -d --entitlements - "$BACKEND_BINARY" > "$SIGNED_BACKEND_ENTITLEMENTS" 2>/dev/null
          if [[ "$SIGNING_IDENTITY" == "-" ]]; then
            grep -q "com.apple.security.cs.disable-library-validation" "$SIGNED_BACKEND_ENTITLEMENTS"
          elif grep -q "com.apple.security.cs.disable-library-validation" "$SIGNED_BACKEND_ENTITLEMENTS"; then
            echo "::error::Developer ID backend must not disable library validation"
            exit 1
          fi

          codesign -d --entitlements - "$NODE_BINARY" > "$SIGNED_NODE_ENTITLEMENTS" 2>/dev/null
          for required in \
            "com.apple.security.cs.allow-jit" \
            "com.apple.security.cs.allow-unsigned-executable-memory"
          do
            grep -q "$required" "$SIGNED_NODE_ENTITLEMENTS"
          done
          for forbidden in \
            "com.apple.security.get-task-allow" \
            "com.apple.security.cs.allow-dyld-environment-variables" \
            "com.apple.security.cs.disable-executable-page-protection" \
            "com.apple.security.cs.disable-library-validation"
          do
            if grep -q "$forbidden" "$SIGNED_NODE_ENTITLEMENTS"; then
              echo "::error::signed Node contains forbidden entitlement: $forbidden"
              exit 1
            fi
          done

          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          codesign -dv --verbose=4 "$APP_PATH" 2>&1

      - name: Verify signed app runtime
        run: |
          set -euo pipefail
          APP_PATH="desktop-tauri/src-tauri/target/${{ matrix.target }}/release/bundle/macos/苏小有.app"
          node scripts/verify-macos-bundle.mjs "$APP_PATH" "$BUNDLE_ARCH" 11.0 --verify-signature

      - name: Create final DMG
        run: |
          set -euo pipefail
          APP_PATH="desktop-tauri/src-tauri/target/${{ matrix.target }}/release/bundle/macos/苏小有.app"
          DMG_DIRECTORY="desktop-tauri/src-tauri/target/${{ matrix.target }}/release/bundle/dmg"
          VERSION="$(node -p "require('./package.json').version")"
          DMG_PATH="$DMG_DIRECTORY/苏小有_${VERSION}_${DMG_ARCH}.dmg"
          STAGING_DIRECTORY="$(mktemp -d)"
          trap 'rm -rf "$STAGING_DIRECTORY"' EXIT

          mkdir -p "$DMG_DIRECTORY"
          rm -f "$DMG_DIRECTORY"/*.dmg
          ditto "$APP_PATH" "$STAGING_DIRECTORY/苏小有.app"
          ln -s /Applications "$STAGING_DIRECTORY/Applications"
          hdiutil create -volname "苏小有" -srcfolder "$STAGING_DIRECTORY" -fs APFS -ov -format UDZO "$DMG_PATH"
          hdiutil verify "$DMG_PATH"

      - name: Sign final DMG
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        env:
          SIGNING_IDENTITY: ${{ steps.apple-signing.outputs.identity }}
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          DMG_PATH="desktop-tauri/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/苏小有_${VERSION}_${DMG_ARCH}.dmg"
          codesign --force --timestamp --sign "$SIGNING_IDENTITY" "$DMG_PATH"

      - name: Notarize and staple final DMG
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          VERSION="$(node -p "require('./package.json').version")"
          DMG_PATH="desktop-tauri/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/苏小有_${VERSION}_${DMG_ARCH}.dmg"
          xcrun notarytool submit "$DMG_PATH" --apple-id "$APPLE_ID" --password "$APPLE_PASSWORD" --team-id "$APPLE_TEAM_ID" --wait
          xcrun stapler staple "$DMG_PATH"
          xcrun stapler validate "$DMG_PATH"

      - name: Verify official signatures and Gatekeeper
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        run: |
          set -euo pipefail
          APP_PATH="desktop-tauri/src-tauri/target/${{ matrix.target }}/release/bundle/macos/苏小有.app"
          VERSION="$(node -p "require('./package.json').version")"
          DMG_PATH="desktop-tauri/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/苏小有_${VERSION}_${DMG_ARCH}.dmg"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          codesign --verify --strict --verbose=2 "$DMG_PATH"
          spctl --assess --type open --context context:primary-signature -vv "$DMG_PATH"
          hdiutil verify "$DMG_PATH"

      - name: Verify final DMG contents
        run: |
          set -euo pipefail
          VERSION="$(node -p "require('./package.json').version")"
          DMG_PATH="desktop-tauri/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/苏小有_${VERSION}_${DMG_ARCH}.dmg"
          MOUNT_DIRECTORY="$(mktemp -d)"
          INSTALL_TEST_DIRECTORY="$(mktemp -d)"
          cleanup() {
            hdiutil detach "$MOUNT_DIRECTORY" >/dev/null 2>&1 || true
            rm -rf "$MOUNT_DIRECTORY" "$INSTALL_TEST_DIRECTORY"
          }
          trap cleanup EXIT

          hdiutil verify "$DMG_PATH"
          hdiutil attach -nobrowse -readonly -mountpoint "$MOUNT_DIRECTORY" "$DMG_PATH"
          node scripts/verify-macos-bundle.mjs "$MOUNT_DIRECTORY/苏小有.app" "$BUNDLE_ARCH" 11.0 --verify-signature
          ditto "$MOUNT_DIRECTORY/苏小有.app" "$INSTALL_TEST_DIRECTORY/苏小有.app"
          node scripts/verify-macos-bundle.mjs "$INSTALL_TEST_DIRECTORY/苏小有.app" "$BUNDLE_ARCH" 11.0 --verify-signature
          APP_EXECUTABLE="$(plutil -extract CFBundleExecutable raw "$INSTALL_TEST_DIRECTORY/苏小有.app/Contents/Info.plist")"
          node scripts/verify-desktop-lifecycle.mjs \
            --executable "$INSTALL_TEST_DIRECTORY/苏小有.app/Contents/MacOS/$APP_EXECUTABLE" \
            --work-dir "$RUNNER_TEMP/suxiaoyou-desktop-lifecycle-macos-$DMG_ARCH"
          hdiutil detach "$MOUNT_DIRECTORY"
          trap - EXIT
          rm -rf "$MOUNT_DIRECTORY" "$INSTALL_TEST_DIRECTORY"

      - name: Remove temporary Apple keychain
        if: always() && github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        run: |
          security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db" 2>/dev/null || true
          rm -f "$RUNNER_TEMP/apple-certificate.p12"

      - name: Upload macOS lifecycle diagnostics
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: macos-${{ env.DMG_ARCH }}-lifecycle-diagnostics-${{ github.run_attempt }}
          path: ${{ runner.temp }}/suxiaoyou-desktop-lifecycle-macos-${{ env.DMG_ARCH }}
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload macOS artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: macos-${{ env.DMG_ARCH }}-${{ github.event_name == 'workflow_dispatch' && 'ADHOC-TEST' || 'release' }}
          path: desktop-tauri/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
          if-no-files-found: error
          retention-days: 1

  build-linux:
    name: Build Linux x64
    needs: validate-release
    if: github.event_name == 'push' || inputs.target == 'linux-x64'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev rpm cpio file patchelf build-essential curl wget libssl-dev libgtk-3-dev libsoup-3.0-dev libxdo-dev xvfb dbus-x11

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12.13"

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable 2026-06-30
        with:
          toolchain: "1.96.1"

      - name: Install locked JavaScript dependencies
        run: |
          npm ci
          npm --prefix frontend ci --legacy-peer-deps
          npm --prefix desktop-tauri ci

      - name: Build and sanitize frontend
        run: npm run build:frontend

      - name: Build backend with locked PyInstaller
        run: |
          python -m pip install --require-hashes --only-binary=cryptography -r backend/requirements.txt
          python -m pip install pyinstaller==6.21.0
          cd backend
          python -m PyInstaller suxiaoyou.spec --noconfirm

      - name: Verify backend bundle
        run: node scripts/verify-bundle.mjs backend/dist/suxiaoyou-backend

      - name: Download verified Node.js runtime
        run: |
          cd backend
          python scripts/download_node.py

      - name: Verify bundled Node.js toolchain
        run: node scripts/verify-node-runtime.mjs backend/resources/nodejs

      - name: Build Tauri Linux installers
        run: |
          cd desktop-tauri
          npm exec tauri build -- --config src-tauri/build.linux-x64.json --no-sign

      - name: Verify Linux installers and packaged Node.js toolchain
        run: |
          set -euo pipefail
          shopt -s nullglob
          debs=(desktop-tauri/src-tauri/target/release/bundle/deb/*.deb)
          rpms=(desktop-tauri/src-tauri/target/release/bundle/rpm/*.rpm)
          if (( ${#debs[@]} != 1 )); then
            printf '::error::Expected exactly one DEB installer, found %d: %s\n' "${#debs[@]}" "${debs[*]-}"
            exit 1
          fi
          if (( ${#rpms[@]} != 1 )); then
            printf '::error::Expected exactly one RPM installer, found %d: %s\n' "${#rpms[@]}" "${rpms[*]-}"
            exit 1
          fi
          printf 'Verifying DEB %s and RPM %s\n' "${debs[0]}" "${rpms[0]}"

          VERSION="$(node -p "require('./package.json').version")"
          DEB_VERSION="$(dpkg-deb -f "${debs[0]}" Version)"
          DEB_ARCH="$(dpkg-deb -f "${debs[0]}" Architecture)"
          RPM_VERSION="$(rpm -qp --queryformat '%{VERSION}' "${rpms[0]}")"
          RPM_ARCH="$(rpm -qp --queryformat '%{ARCH}' "${rpms[0]}")"
          [[ "$DEB_VERSION" == "$VERSION" ]] || {
            echo "::error::DEB version is $DEB_VERSION, expected $VERSION"
            exit 1
          }
          [[ "$DEB_ARCH" == "amd64" ]] || {
            echo "::error::DEB architecture is $DEB_ARCH, expected amd64"
            exit 1
          }
          [[ "$RPM_VERSION" == "$VERSION" ]] || {
            echo "::error::RPM version is $RPM_VERSION, expected $VERSION"
            exit 1
          }
          [[ "$RPM_ARCH" == "x86_64" ]] || {
            echo "::error::RPM architecture is $RPM_ARCH, expected x86_64"
            exit 1
          }

          DEB_ROOT="$RUNNER_TEMP/suxiaoyou-deb-root"
          RPM_ROOT="$RUNNER_TEMP/suxiaoyou-rpm-root"
          RPM_PAYLOAD="$RUNNER_TEMP/suxiaoyou-rpm-payload.cpio"
          RPM_CPIO_LIST="$RUNNER_TEMP/suxiaoyou-rpm-cpio.list"
          RPM_QUERY_LIST="$RUNNER_TEMP/suxiaoyou-rpm-query.list"
          rm -rf "$DEB_ROOT" "$RPM_ROOT"
          rm -f "$RPM_PAYLOAD" "$RPM_CPIO_LIST" "$RPM_QUERY_LIST"
          mkdir -p "$DEB_ROOT" "$RPM_ROOT"
          dpkg-deb -x "${debs[0]}" "$DEB_ROOT"
          rpm -K "${rpms[0]}"

          # Tauri RPMs do not currently carry ARCHIVESIZE/LONGARCHIVESIZE.
          # Ubuntu 22.04's rpm2cpio 4.17 therefore copies the complete payload
          # but returns 1 after comparing its byte count with a missing header
          # value.  Capture that documented status, then independently require
          # valid RPM digests, a complete CPIO index, matching package entry
          # counts, successful extraction, and executable installed runtimes.
          set +e
          rpm2cpio "${rpms[0]}" > "$RPM_PAYLOAD"
          rpm2cpio_status=$?
          set -e
          if (( rpm2cpio_status != 0 && rpm2cpio_status != 1 )); then
            printf '::error::rpm2cpio exited with unexpected status %d\n' "$rpm2cpio_status"
            exit 1
          fi
          if (( rpm2cpio_status == 1 )); then
            echo '::warning::rpm2cpio returned 1 for a Tauri RPM without an archive-size header; validating the emitted payload independently'
          fi
          if [[ ! -s "$RPM_PAYLOAD" ]]; then
            echo '::error::rpm2cpio produced an empty payload'
            exit 1
          fi
          cpio -it --quiet < "$RPM_PAYLOAD" > "$RPM_CPIO_LIST"
          rpm -qpl "${rpms[0]}" > "$RPM_QUERY_LIST"
          cpio_entries="$(wc -l < "$RPM_CPIO_LIST")"
          rpm_entries="$(wc -l < "$RPM_QUERY_LIST")"
          if (( cpio_entries == 0 || cpio_entries != rpm_entries )); then
            printf '::error::RPM/CPIO entry-count mismatch: rpm=%d cpio=%d\n' "$rpm_entries" "$cpio_entries"
            exit 1
          fi
          printf 'Validated RPM payload: %d package entries, %s bytes\n' "$cpio_entries" "$(stat -c %s "$RPM_PAYLOAD")"
          (cd "$RPM_ROOT" && cpio -idm --quiet < "$RPM_PAYLOAD")

          for root in "$DEB_ROOT" "$RPM_ROOT"; do
            printf 'Inspecting extracted installer root: %s\n' "$root"
            mapfile -t node_binaries < <(find -L "$root" -type f -path '*/nodejs/bin/node')
            if (( ${#node_binaries[@]} != 1 )); then
              printf '::error::Expected exactly one packaged Node binary under %s, found %d\n' "$root" "${#node_binaries[@]}"
              printf '%s\n' "${node_binaries[@]-}"
              find "$root" -path '*nodejs*' \( -type f -o -type l \) -print | sort
              exit 1
            fi
            printf 'Packaged Node binary: %s\n' "${node_binaries[0]}"
            runtime="$(dirname "$(dirname "${node_binaries[0]}")")"
            node scripts/verify-node-runtime.mjs "$runtime"

            mapfile -t backend_binaries < <(find -L "$root" -type f -path '*/backend/suxiaoyou-backend')
            if (( ${#backend_binaries[@]} != 1 )); then
              printf '::error::Expected exactly one packaged backend under %s, found %d\n' "$root" "${#backend_binaries[@]}"
              printf '%s\n' "${backend_binaries[@]-}"
              find "$root" -path '*backend*' \( -type f -o -type l \) -print | sort
              exit 1
            fi
            printf 'Packaged backend binary: %s\n' "${backend_binaries[0]}"
            node scripts/verify-bundle.mjs "$(dirname "${backend_binaries[0]}")"
          done
          rm -f "$RPM_PAYLOAD" "$RPM_CPIO_LIST" "$RPM_QUERY_LIST"

      - name: Install Linux packages and verify desktop lifecycle
        run: |
          set -euo pipefail
          shopt -s nullglob
          debs=(desktop-tauri/src-tauri/target/release/bundle/deb/*.deb)
          rpms=(desktop-tauri/src-tauri/target/release/bundle/rpm/*.rpm)
          [[ ${#debs[@]} -eq 1 && ${#rpms[@]} -eq 1 ]]

          DEB_INSPECT_ROOT="$RUNNER_TEMP/suxiaoyou-deb-launcher"
          RPM_INSPECT_ROOT="$RUNNER_TEMP/suxiaoyou-rpm-launcher"
          rm -rf "$DEB_INSPECT_ROOT" "$RPM_INSPECT_ROOT"
          mkdir -p "$DEB_INSPECT_ROOT" "$RPM_INSPECT_ROOT"
          dpkg-deb -x "${debs[0]}" "$DEB_INSPECT_ROOT"
          set +e
          rpm2cpio "${rpms[0]}" > "$RUNNER_TEMP/suxiaoyou-lifecycle-rpm.cpio"
          rpm2cpio_status=$?
          set -e
          if (( rpm2cpio_status != 0 && rpm2cpio_status != 1 )); then
            echo "::error::rpm2cpio exited with unexpected status $rpm2cpio_status during lifecycle install"
            exit 1
          fi
          (cd "$RPM_INSPECT_ROOT" && cpio -idm --quiet < "$RUNNER_TEMP/suxiaoyou-lifecycle-rpm.cpio")

          mapfile -d '' -t deb_launchers < <(
            find "$DEB_INSPECT_ROOT/usr/bin" -mindepth 1 -maxdepth 1 \( -type f -o -type l \) -print0
          )
          mapfile -d '' -t rpm_launchers < <(
            find "$RPM_INSPECT_ROOT/usr/bin" -mindepth 1 -maxdepth 1 \( -type f -o -type l \) -print0
          )
          if (( ${#deb_launchers[@]} != 1 || ${#rpm_launchers[@]} != 1 )); then
            echo "::error::Expected one desktop launcher in each Linux package (deb=${#deb_launchers[@]}, rpm=${#rpm_launchers[@]})"
            exit 1
          fi
          DEB_LAUNCHER="${deb_launchers[0]#"$DEB_INSPECT_ROOT"}"
          RPM_LAUNCHER="${rpm_launchers[0]#"$RPM_INSPECT_ROOT"}"
          DEB_PACKAGE="$(dpkg-deb -f "${debs[0]}" Package)"
          RPM_PACKAGE="$(rpm -qp --queryformat '%{NAME}' "${rpms[0]}")"
          deb_installed=0
          rpm_installed=0
          cleanup_packages() {
            if (( rpm_installed )); then sudo rpm -e "$RPM_PACKAGE" >/dev/null 2>&1 || true; fi
            if (( deb_installed )); then sudo dpkg --purge "$DEB_PACKAGE" >/dev/null 2>&1 || true; fi
            rm -f "$RUNNER_TEMP/suxiaoyou-lifecycle-rpm.cpio"
          }
          trap cleanup_packages EXIT

          sudo dpkg -i "${debs[0]}"
          deb_installed=1
          [[ -x "$DEB_LAUNCHER" ]]
          xvfb-run -a dbus-run-session -- \
            node scripts/verify-desktop-lifecycle.mjs \
              --executable "$DEB_LAUNCHER" \
              --work-dir "$RUNNER_TEMP/suxiaoyou-desktop-lifecycle-linux-deb"
          sudo dpkg --purge "$DEB_PACKAGE"
          deb_installed=0

          sudo rpm -i --nodeps "${rpms[0]}"
          rpm_installed=1
          [[ -x "$RPM_LAUNCHER" ]]
          xvfb-run -a dbus-run-session -- \
            node scripts/verify-desktop-lifecycle.mjs \
              --executable "$RPM_LAUNCHER" \
              --work-dir "$RUNNER_TEMP/suxiaoyou-desktop-lifecycle-linux-rpm"
          sudo rpm -e "$RPM_PACKAGE"
          rpm_installed=0
          trap - EXIT
          cleanup_packages

      - name: Upload Linux lifecycle diagnostics
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: linux-lifecycle-diagnostics-${{ github.run_attempt }}
          path: ${{ runner.temp }}/suxiaoyou-desktop-lifecycle-linux-*
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload Linux artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: linux-x64-${{ github.event_name == 'workflow_dispatch' && 'UNSIGNED-TEST' || 'release' }}
          path: |
            desktop-tauri/src-tauri/target/release/bundle/deb/*.deb
            desktop-tauri/src-tauri/target/release/bundle/rpm/*.rpm
          if-no-files-found: error
          retention-days: 1

  publish:
    name: Create draft GitHub Release
    needs: [validate-release, build-windows, build-macos, build-linux]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f -print | sort

      - name: Verify artifact completeness
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          require_one() {
            local label="$1"
            local directory="$2"
            local pattern="$3"
            local matches=()
            while IFS= read -r -d '' path; do
              matches+=("$path")
            done < <(find "$directory" -type f -name "$pattern" -print0)
            if [[ ${#matches[@]} -ne 1 ]]; then
              echo "::error::expected exactly one $label in $directory, found ${#matches[@]}"
              exit 1
            fi
          }

          require_one "Windows NSIS installer (*.exe)" artifacts/windows-release "*.exe"
          require_one "macOS Apple Silicon installer (*.dmg)" artifacts/macos-aarch64-release "*.dmg"
          require_one "macOS Intel installer (*.dmg)" artifacts/macos-x64-release "*.dmg"
          require_one "Linux Debian installer (*.deb)" artifacts/linux-x64-release "*.deb"
          require_one "Linux RPM installer (*.rpm)" artifacts/linux-x64-release "*.rpm"
          require_one "Windows NSIS installer for $VERSION" artifacts/windows-release "*${VERSION}*.exe"
          require_one "macOS Apple Silicon installer for $VERSION" artifacts/macos-aarch64-release "*${VERSION}*_aarch64.dmg"
          require_one "macOS Intel installer for $VERSION" artifacts/macos-x64-release "*${VERSION}*_x64.dmg"
          require_one "Linux Debian installer for $VERSION" artifacts/linux-x64-release "*${VERSION}*.deb"
          require_one "Linux RPM installer for $VERSION" artifacts/linux-x64-release "*${VERSION}*.rpm"

      - name: Stage stable release asset names
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          rm -rf release-assets
          mkdir release-assets
          copy_one() {
            local directory="$1"
            local pattern="$2"
            local destination="$3"
            local source
            source="$(find "$directory" -type f -name "$pattern" -print -quit)"
            [[ -n "$source" ]]
            cp -- "$source" "release-assets/$destination"
          }
          copy_one artifacts/windows-release "*.exe" "suxiaoyou-${VERSION}-windows-x64-setup.exe"
          copy_one artifacts/macos-aarch64-release "*.dmg" "suxiaoyou-${VERSION}-macos-aarch64.dmg"
          copy_one artifacts/macos-x64-release "*.dmg" "suxiaoyou-${VERSION}-macos-x64.dmg"
          copy_one artifacts/linux-x64-release "*.deb" "suxiaoyou-${VERSION}-linux-amd64.deb"
          copy_one artifacts/linux-x64-release "*.rpm" "suxiaoyou-${VERSION}-linux-x86_64.rpm"
          [[ "$(find release-assets -maxdepth 1 -type f | wc -l | tr -d ' ')" == "5" ]]

      - name: Generate SHA-256 checksums
        run: node scripts/generate-checksums.mjs release-assets CHECKSUMS.md

      - name: Generate and verify manual-download release manifest
        run: |
          RELEASE_COMMIT="$(git rev-parse "$GITHUB_SHA^{commit}")"
          node scripts/generate-release-manifest.mjs \
            release-assets \
            "$GITHUB_REF_NAME" \
            "$RELEASE_COMMIT" \
            "$GITHUB_REPOSITORY" \
            CHECKSUMS.md \
            release-manifest.json
          node scripts/verify-release-manifest.mjs \
            release-manifest.json \
            release-assets \
            CHECKSUMS.md \
            "$GITHUB_REF_NAME" \
            "$RELEASE_COMMIT" \
            "$GITHUB_REPOSITORY"

      - name: Record installer trust status
        run: |
          {
            cat <<'EOF'
          ## 安装包信任与验证状态

          - macOS Apple Silicon 与 Intel：Developer ID 签名，已通过 Apple 公证并 stapled。
          - Windows NSIS：当前未配置 Authenticode 代码签名；已在原生 Windows runner 静默安装并验证内置运行时。
          - Linux DEB/RPM：当前未配置仓库签名；已验证包元数据、完整解包和内置运行时。
          - 所有安装包均由本次 tag 的隔离 runner 构建；以下 SHA-256 是下载后完整性校验依据。
          - `release-manifest.json` 仅提供可信版本发现与手动下载链接，不声明或执行自动更新。

          EOF
            cat CHECKSUMS.md
          } > RELEASE-BODY.md

      - name: Create draft GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          draft: true
          generate_release_notes: true
          body_path: RELEASE-BODY.md
          append_body: true
          files: |
            release-assets/*
            CHECKSUMS.md
            release-manifest.json
