name: Release Desktop

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      target:
        description: Build one test target (macOS app is ad-hoc signed)
        required: true
        default: macos-aarch64
        type: choice
        options:
          - macos-aarch64
          - macos-x64
          - windows-x64
          - linux-x64
          - linux-arm64

permissions:
  contents: read

jobs:
  validate-release:
    name: Validate release contract
    runs-on: ubuntu-22.04
    outputs:
      app_version: ${{ steps.release-context.outputs.app_version }}
      release_version: ${{ steps.release-context.outputs.release_version }}
      release_channel: ${{ steps.release-context.outputs.release_channel }}
      is_stable: ${{ steps.release-context.outputs.is_stable }}
      macos_artifact_profile: ${{ steps.release-context.outputs.macos_artifact_profile }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Require official tag commit on main
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        run: |
          set -euo pipefail
          if ! git merge-base --is-ancestor "$GITHUB_SHA" refs/remotes/origin/main; then
            echo "::error::official release tag $GITHUB_REF_NAME is not reachable from origin/main"
            exit 1
          fi

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      - name: Resolve and validate release context
        id: release-context
        run: |
          set -euo pipefail
          APP_VERSION="$(node -p "require('./package.json').version")"
          if [[ ! "$APP_VERSION" =~ ^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "::error::package.json version must use X.Y.Z form, got $APP_VERSION"
            exit 1
          fi

          if [[ "$GITHUB_EVENT_NAME" == "push" && "$GITHUB_REF" == refs/tags/* ]]; then
            APP_VERSION_REGEX="${APP_VERSION//./\\.}"
            if [[ "$GITHUB_REF_NAME" == "v$APP_VERSION" ]]; then
              RELEASE_VERSION="$APP_VERSION"
              RELEASE_CHANNEL="stable"
              IS_STABLE="true"
              MACOS_ARTIFACT_PROFILE="release"
            elif [[ "$GITHUB_REF_NAME" =~ ^v${APP_VERSION_REGEX}-rc\.([1-9][0-9]*)$ ]]; then
              RELEASE_VERSION="${GITHUB_REF_NAME#v}"
              RELEASE_CHANNEL="prerelease"
              IS_STABLE="false"
              MACOS_ARTIFACT_PROFILE="RC-ADHOC-NOT-NOTARIZED"
            else
              echo "::error::tag must be v$APP_VERSION or v$APP_VERSION-rc.N with N >= 1; got $GITHUB_REF_NAME"
              exit 1
            fi
          else
            RELEASE_VERSION="$APP_VERSION"
            RELEASE_CHANNEL="manual-test"
            IS_STABLE="false"
            MACOS_ARTIFACT_PROFILE="ADHOC-TEST"
          fi

          echo "app_version=$APP_VERSION" >> "$GITHUB_OUTPUT"
          echo "release_version=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"
          echo "release_channel=$RELEASE_CHANNEL" >> "$GITHUB_OUTPUT"
          echo "is_stable=$IS_STABLE" >> "$GITHUB_OUTPUT"
          echo "macos_artifact_profile=$MACOS_ARTIFACT_PROFILE" >> "$GITHUB_OUTPUT"

      - name: Require Apple credentials for a stable tag
        if: github.event_name == 'push' && steps.release-context.outputs.is_stable == 'true'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          missing=()
          [[ -n "$APPLE_CERTIFICATE" ]] || missing+=("APPLE_CERTIFICATE")
          [[ -n "$APPLE_CERTIFICATE_PASSWORD" ]] || missing+=("APPLE_CERTIFICATE_PASSWORD")
          [[ -n "$APPLE_ID" ]] || missing+=("APPLE_ID")
          [[ -n "$APPLE_PASSWORD" ]] || missing+=("APPLE_PASSWORD")
          [[ -n "$APPLE_TEAM_ID" ]] || missing+=("APPLE_TEAM_ID")
          if (( ${#missing[@]} > 0 )); then
            echo "::error::stable tags require Apple credentials: ${missing[*]}"
            exit 1
          fi

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12.13"

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable 2026-06-30
        with:
          toolchain: "1.96.1"
          components: clippy

      - name: Install validation dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bubblewrap libcairo2-dev pkg-config libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev libxdo-dev libssl-dev
          npm ci
          npm --prefix frontend ci --legacy-peer-deps
          npm --prefix desktop-tauri ci
          python -m pip install --require-hashes --only-binary=cryptography -r backend/requirements.txt
          python -m pip install -e ./backend --no-deps
          python -m pip install pytest==9.1.1 pytest-asyncio==1.4.0 pip-audit==2.10.1
          cargo install cargo-audit --locked --version 0.22.2

      - name: Install Chromium validation runtime
        run: |
          cd frontend
          npx playwright install --with-deps chromium

      - name: Validate metadata and workflow contracts
        env:
          APP_VERSION: ${{ steps.release-context.outputs.app_version }}
        run: |
          set -euo pipefail
          node scripts/release-metadata.mjs "$APP_VERSION"
          node --test scripts/*.test.mjs

      - name: Capture v1 integration contract evidence
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v1.0.0')
        run: |
          set -euo pipefail
          node scripts/v1-real-integration-gates.mjs contract \
            --require-evidence-eligible true \
            --evidence-dir "$RUNNER_TEMP/v1-integration-evidence"

      - name: Require real integration credentials for stable tag
        if: github.event_name == 'push' && steps.release-context.outputs.is_stable == 'true'
        env:
          TENCENT_DOCS_E2E_TOKEN: ${{ secrets.TENCENT_DOCS_E2E_TOKEN }}
          TENCENT_DOCS_E2E_TEST_DOCUMENT_ID: ${{ secrets.TENCENT_DOCS_E2E_TEST_DOCUMENT_ID }}
          TENCENT_DOCS_E2E_BASELINE_TEXT: ${{ secrets.TENCENT_DOCS_E2E_BASELINE_TEXT }}
          TENCENT_DOCS_E2E_READ_ARGS_JSON: ${{ secrets.TENCENT_DOCS_E2E_READ_ARGS_JSON }}
          TENCENT_DOCS_E2E_WRITE_TOOL: ${{ secrets.TENCENT_DOCS_E2E_WRITE_TOOL }}
          TENCENT_DOCS_E2E_WRITE_ARGS_JSON: ${{ secrets.TENCENT_DOCS_E2E_WRITE_ARGS_JSON }}
          TENCENT_DOCS_E2E_RESTORE_TOOL: ${{ secrets.TENCENT_DOCS_E2E_RESTORE_TOOL }}
          TENCENT_DOCS_E2E_RESTORE_ARGS_JSON: ${{ secrets.TENCENT_DOCS_E2E_RESTORE_ARGS_JSON }}
          SILICONFLOW_IMAGE_E2E_API_KEY: ${{ secrets.SILICONFLOW_IMAGE_E2E_API_KEY }}
          SILICONFLOW_IMAGE_E2E_MAX_COST_CNY: ${{ secrets.SILICONFLOW_IMAGE_E2E_MAX_COST_CNY }}
        run: |
          set -euo pipefail
          missing=()
          for name in \
            TENCENT_DOCS_E2E_TOKEN \
            TENCENT_DOCS_E2E_TEST_DOCUMENT_ID \
            TENCENT_DOCS_E2E_BASELINE_TEXT \
            TENCENT_DOCS_E2E_READ_ARGS_JSON \
            TENCENT_DOCS_E2E_WRITE_TOOL \
            TENCENT_DOCS_E2E_WRITE_ARGS_JSON \
            TENCENT_DOCS_E2E_RESTORE_TOOL \
            TENCENT_DOCS_E2E_RESTORE_ARGS_JSON \
            SILICONFLOW_IMAGE_E2E_API_KEY \
            SILICONFLOW_IMAGE_E2E_MAX_COST_CNY
          do
            [[ -n "${!name}" ]] || missing+=("$name")
          done
          if (( ${#missing[@]} > 0 )); then
            echo "::error::stable v1.0.0 requires real integration secrets: ${missing[*]}"
            exit 1
          fi

      - name: Capture stable real integration evidence
        if: github.event_name == 'push' && steps.release-context.outputs.is_stable == 'true'
        env:
          TENCENT_DOCS_E2E_TOKEN: ${{ secrets.TENCENT_DOCS_E2E_TOKEN }}
          TENCENT_DOCS_E2E_ALLOW_WRITE: I_UNDERSTAND_THIS_MODIFIES_A_DEDICATED_TEST_DOCUMENT
          TENCENT_DOCS_E2E_TEST_DOCUMENT_ID: ${{ secrets.TENCENT_DOCS_E2E_TEST_DOCUMENT_ID }}
          TENCENT_DOCS_E2E_BASELINE_TEXT: ${{ secrets.TENCENT_DOCS_E2E_BASELINE_TEXT }}
          TENCENT_DOCS_E2E_READ_ARGS_JSON: ${{ secrets.TENCENT_DOCS_E2E_READ_ARGS_JSON }}
          TENCENT_DOCS_E2E_WRITE_TOOL: ${{ secrets.TENCENT_DOCS_E2E_WRITE_TOOL }}
          TENCENT_DOCS_E2E_WRITE_ARGS_JSON: ${{ secrets.TENCENT_DOCS_E2E_WRITE_ARGS_JSON }}
          TENCENT_DOCS_E2E_RESTORE_TOOL: ${{ secrets.TENCENT_DOCS_E2E_RESTORE_TOOL }}
          TENCENT_DOCS_E2E_RESTORE_ARGS_JSON: ${{ secrets.TENCENT_DOCS_E2E_RESTORE_ARGS_JSON }}
          SILICONFLOW_IMAGE_E2E_API_KEY: ${{ secrets.SILICONFLOW_IMAGE_E2E_API_KEY }}
          SILICONFLOW_IMAGE_E2E_ALLOW_PAID_REQUEST: I_UNDERSTAND_THIS_MAY_USE_PROVIDER_QUOTA_OR_INCUR_COST
          SILICONFLOW_IMAGE_E2E_MAX_REQUESTS: "1"
          SILICONFLOW_IMAGE_E2E_MAX_COST_CNY: ${{ secrets.SILICONFLOW_IMAGE_E2E_MAX_COST_CNY }}
        run: |
          set -euo pipefail
          node scripts/v1-real-integration-gates.mjs live tencent-real-write \
            --evidence-dir "$RUNNER_TEMP/v1-integration-evidence"
          node scripts/v1-real-integration-gates.mjs live siliconflow-image-real \
            --evidence-dir "$RUNNER_TEMP/v1-integration-evidence"

      - name: Upload v1 integration evidence
        if: always() && github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v1.0.0')
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: v1-integration-evidence-${{ github.run_attempt }}
          path: ${{ runner.temp }}/v1-integration-evidence
          if-no-files-found: error
          retention-days: 30

      - name: Audit and test JavaScript production graphs
        run: |
          npm audit --omit=dev
          npm --prefix frontend audit --omit=dev
          npm --prefix desktop-tauri audit --omit=dev
          cd frontend
          npx tsc --noEmit
          npm run lint
          node --test tests/unit/*.test.ts
          npm run test:ui:core

      - name: Audit and test backend production graph
        run: |
          cd backend
          python -m pip check
          pip-audit -r requirements.txt
          pytest -q

      - name: Prepare placeholder Tauri resources for Rust validation
        working-directory: desktop-tauri/src-tauri
        run: |
          mkdir -p \
            ../../backend/dist/suxiaoyou-backend \
            ../../backend/resources/nodejs

      - name: Validate Rust desktop graph
        run: |
          set -euo pipefail
          mkdir -p ../../release-validation
          cargo metadata --locked --format-version 1 >/dev/null
          AUDIT_STATUS=0
          cargo audit --file Cargo.lock --json \
            > ../../release-validation/cargo-audit-report.json \
            || AUDIT_STATUS=$?
          node ../../scripts/cargo-audit-summary.mjs \
            generate \
            ../../release-validation/cargo-audit-report.json \
            ../../release-validation/cargo-audit-summary.json
          node ../../scripts/cargo-audit-summary.mjs \
            verify ../../release-validation/cargo-audit-summary.json
          node ../../scripts/cargo-audit-summary.mjs \
            assert-clean ../../release-validation/cargo-audit-summary.json
          if (( AUDIT_STATUS != 0 )); then
            echo "::error::cargo-audit failed with status $AUDIT_STATUS"
            exit "$AUDIT_STATUS"
          fi
          cargo test --locked
          cargo clippy --locked --all-targets -- -D warnings
        working-directory: desktop-tauri/src-tauri

      - name: Upload Rust audit summary
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cargo-audit-summary
          path: release-validation/cargo-audit-summary.json
          if-no-files-found: error
          retention-days: 1

  build-windows:
    name: Build Windows x64
    needs: validate-release
    if: github.event_name == 'push' || inputs.target == 'windows-x64'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          # CPython 3.12.10 is the final 3.12 release with an official
          # Windows binary; later 3.12 security releases are source-only.
          python-version: "3.12.10"

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable 2026-06-30
        with:
          toolchain: "1.96.1"

      - name: Install locked JavaScript dependencies
        run: |
          npm ci
          npm --prefix frontend ci --legacy-peer-deps
          npm --prefix desktop-tauri ci

      - name: Build and sanitize frontend
        run: npm run build:frontend

      - name: Build backend with locked PyInstaller
        run: |
          python -m pip install --require-hashes --only-binary=cryptography -r backend/requirements.txt
          python -m pip install pyinstaller==6.21.0 pytest==9.1.1 pytest-asyncio==1.4.0 pip-audit==2.10.1
          python -m pytest -q backend/tests/test_run.py backend/tests/test_scripts/test_download_node.py backend/tests/test_tool/test_windows_process.py backend/tests/test_tool/test_windows_mutation_safety.py backend/tests/test_tool/test_sandbox.py backend/tests/test_tool/test_sandbox_self_test.py backend/tests/test_tool/test_bash.py backend/tests/test_tool/test_code_execute.py backend/tests/test_tool/test_registry.py
          cd backend
          python -m PyInstaller suxiaoyou.spec --noconfirm

      - name: Audit Windows backend production dependency graph
        run: python -m pip_audit --strict --require-hashes -r backend/requirements.txt

      - name: Verify backend bundle
        env:
          VERIFY_BUNDLE_OFFICE_PLATFORM: windows-x64
        run: node scripts/verify-bundle.mjs backend/dist/suxiaoyou-backend

      - name: Download verified Node.js runtime
        run: |
          cd backend
          python scripts/download_node.py

      - name: Verify bundled Node.js toolchain
        run: node scripts/verify-node-runtime.mjs backend/resources/nodejs

      - name: Build Tauri NSIS installer
        shell: bash
        run: |
          cd desktop-tauri
          npm exec tauri build -- --config src-tauri/build.windows.json --no-sign

      - name: Verify Windows artifact completeness
        shell: bash
        run: |
          shopt -s nullglob
          installers=(desktop-tauri/src-tauri/target/release/bundle/nsis/*.exe)
          [[ ${#installers[@]} -eq 1 ]]

      - name: Install NSIS package and verify packaged Node.js toolchain
        id: install-windows
        env:
          VERIFY_BUNDLE_OFFICE_PLATFORM: windows-x64
          VERIFY_BUNDLE_OFFICE_REPORT: ${{ runner.temp }}/suxiaoyou-office-contract-windows/office-contract.json
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $installer = @(Get-ChildItem "desktop-tauri/src-tauri/target/release/bundle/nsis/*.exe")
          if ($installer.Count -ne 1) {
            throw "Expected exactly one NSIS installer, found $($installer.Count)"
          }
          $expectedVersion = (& node -p "require('./package.json').version").Trim()
          if ($installer[0].Name -notmatch [regex]::Escape($expectedVersion)) {
            throw "NSIS installer name does not contain version ${expectedVersion}: $($installer[0].Name)"
          }
          $installerProductName = $installer[0].VersionInfo.ProductName
          if ($installerProductName -ne "suyo") {
            throw "NSIS installer ProductName is $installerProductName, expected suyo"
          }

          $installDirectory = Join-Path $env:RUNNER_TEMP "suxiaoyou-nsis-install"
          $expectedAppExecutable = "suxiaoyou-desktop.exe"
          $expectedAppPath = Join-Path $installDirectory $expectedAppExecutable
          $startMenuPrograms = [Environment]::GetFolderPath("Programs")
          $desktopDirectory = [Environment]::GetFolderPath("Desktop")
          $legacyShortcuts = @(
            (Join-Path $startMenuPrograms "苏小有.lnk"),
            (Join-Path $desktopDirectory "苏小有.lnk")
          )
          $localizedShortcuts = @(
            (Join-Path $startMenuPrograms "suyo.lnk"),
            (Join-Path $desktopDirectory "suyo.lnk")
          )
          Remove-Item -Recurse -Force $installDirectory -ErrorAction SilentlyContinue
          Remove-Item -Force -LiteralPath ($legacyShortcuts + $localizedShortcuts) -ErrorAction SilentlyContinue
          $shortcutShell = New-Object -ComObject WScript.Shell
          for ($shortcutIndex = 0; $shortcutIndex -lt $legacyShortcuts.Count; $shortcutIndex++) {
            # WScript.Shell on GitHub's runner cannot save a shortcut directly
            # to a non-ASCII path. Save through an ASCII temporary path, then
            # let PowerShell perform the Unicode-safe rename that seeds the
            # real rc.1 shortcut migration scenario.
            $legacyShortcut = $legacyShortcuts[$shortcutIndex]
            $shortcutSeed = Join-Path $env:RUNNER_TEMP "suxiaoyou-legacy-$shortcutIndex.lnk"
            Remove-Item -Force -LiteralPath $shortcutSeed -ErrorAction SilentlyContinue
            $shortcut = $shortcutShell.CreateShortcut($shortcutSeed)
            $shortcut.TargetPath = $expectedAppPath
            $shortcut.Save()
            Move-Item -Force -LiteralPath $shortcutSeed -Destination $legacyShortcut
          }
          # Seed the legacy Chinese preference, then require the documented
          # custom /L override to replace it with English. This proves the
          # silent installer does not merely inherit its saved/default locale;
          # /D must remain the final argument per the NSIS CLI contract.
          $installerLanguageRegistryPath = "HKCU:\Software\suxiaoyou\苏小有"
          New-Item -Path $installerLanguageRegistryPath -Force | Out-Null
          New-ItemProperty `
            -Path $installerLanguageRegistryPath `
            -Name "Installer Language" `
            -PropertyType String `
            -Value "2052" `
            -Force | Out-Null
          $process = Start-Process `
            -FilePath $installer[0].FullName `
            -ArgumentList @("/S", "/L=1033", "/D=$installDirectory") `
            -Wait `
            -PassThru
          if ($process.ExitCode -ne 0) {
            throw "NSIS installer exited with code $($process.ExitCode)"
          }

          $uninstallRegistryPath = "HKCU:\Software\Microsoft\Windows\CurrentVersion\Uninstall\苏小有"
          if (-not (Test-Path -LiteralPath $uninstallRegistryPath)) {
            throw "Stable NSIS uninstall registry key is missing: $uninstallRegistryPath"
          }
          $uninstallMetadata = Get-ItemProperty -LiteralPath $uninstallRegistryPath
          $installedLanguage = (Get-ItemProperty `
            -LiteralPath $installerLanguageRegistryPath `
            -Name "Installer Language")."Installer Language"
          if ([string]$installedLanguage -ne "1033") {
            throw "Installed language is $installedLanguage, expected 1033"
          }
          if ($uninstallMetadata.DisplayName -ne "suyo") {
            throw "Installed app DisplayName is $($uninstallMetadata.DisplayName), expected suyo"
          }
          $recordedInstallLocation = ([string]$uninstallMetadata.InstallLocation).Trim('"')
          if ([IO.Path]::GetFullPath($recordedInstallLocation) -ne [IO.Path]::GetFullPath($installDirectory)) {
            throw "Installed app location is $recordedInstallLocation, expected $installDirectory"
          }

          foreach ($localizedShortcut in $localizedShortcuts) {
            if (-not (Test-Path -LiteralPath $localizedShortcut -PathType Leaf)) {
              throw "Localized shortcut is missing: $localizedShortcut"
            }
            $shortcutTarget = $shortcutShell.CreateShortcut($localizedShortcut).TargetPath
            if ([IO.Path]::GetFullPath($shortcutTarget) -ne [IO.Path]::GetFullPath($expectedAppPath)) {
              throw "Localized shortcut target is $shortcutTarget, expected $expectedAppPath"
            }
          }
          foreach ($legacyShortcut in $legacyShortcuts) {
            if (Test-Path -LiteralPath $legacyShortcut) {
              throw "Legacy Chinese shortcut was not migrated: $legacyShortcut"
            }
          }

          # Exercise both localized names on the same installation. The first
          # update proves English -> Chinese shortcut migration; the second
          # returns to English and proves the reverse migration before launch.
          $chineseUpdate = Start-Process `
            -FilePath $installer[0].FullName `
            -ArgumentList @("/S", "/UPDATE", "/L=2052", "/D=$installDirectory") `
            -Wait `
            -PassThru
          if ($chineseUpdate.ExitCode -ne 0) {
            throw "Chinese NSIS language update exited with code $($chineseUpdate.ExitCode)"
          }
          $installedLanguage = (Get-ItemProperty `
            -LiteralPath $installerLanguageRegistryPath `
            -Name "Installer Language")."Installer Language"
          $uninstallMetadata = Get-ItemProperty -LiteralPath $uninstallRegistryPath
          if ([string]$installedLanguage -ne "2052") {
            throw "Chinese language update saved $installedLanguage, expected 2052"
          }
          if ($uninstallMetadata.DisplayName -ne "苏小有") {
            throw "Chinese DisplayName is $($uninstallMetadata.DisplayName), expected 苏小有"
          }
          for ($shortcutIndex = 0; $shortcutIndex -lt $legacyShortcuts.Count; $shortcutIndex++) {
            $chineseShortcut = $legacyShortcuts[$shortcutIndex]
            if (-not (Test-Path -LiteralPath $chineseShortcut -PathType Leaf)) {
              throw "Chinese shortcut is missing after language update: $chineseShortcut"
            }
            # WScript.Shell returns an empty TargetPath when it opens a .lnk
            # through a non-ASCII path on GitHub's Windows runner. Copy the
            # exact shortcut bytes to an ASCII probe path before inspecting it.
            $shortcutProbe = Join-Path $env:RUNNER_TEMP "suxiaoyou-chinese-probe-$shortcutIndex.lnk"
            Remove-Item -Force -LiteralPath $shortcutProbe -ErrorAction SilentlyContinue
            Copy-Item -Force -LiteralPath $chineseShortcut -Destination $shortcutProbe
            $shortcutTarget = $shortcutShell.CreateShortcut($shortcutProbe).TargetPath
            Remove-Item -Force -LiteralPath $shortcutProbe
            if ([IO.Path]::GetFullPath($shortcutTarget) -ne [IO.Path]::GetFullPath($expectedAppPath)) {
              throw "Chinese shortcut target is $shortcutTarget, expected $expectedAppPath"
            }
          }
          foreach ($englishShortcut in $localizedShortcuts) {
            if (Test-Path -LiteralPath $englishShortcut) {
              throw "English shortcut remained after Chinese language update: $englishShortcut"
            }
          }

          $englishUpdate = Start-Process `
            -FilePath $installer[0].FullName `
            -ArgumentList @("/S", "/UPDATE", "/L=1033", "/D=$installDirectory") `
            -Wait `
            -PassThru
          if ($englishUpdate.ExitCode -ne 0) {
            throw "English NSIS language update exited with code $($englishUpdate.ExitCode)"
          }
          $installedLanguage = (Get-ItemProperty `
            -LiteralPath $installerLanguageRegistryPath `
            -Name "Installer Language")."Installer Language"
          $uninstallMetadata = Get-ItemProperty -LiteralPath $uninstallRegistryPath
          if ([string]$installedLanguage -ne "1033") {
            throw "English language update saved $installedLanguage, expected 1033"
          }
          if ($uninstallMetadata.DisplayName -ne "suyo") {
            throw "English DisplayName is $($uninstallMetadata.DisplayName), expected suyo"
          }
          foreach ($englishShortcut in $localizedShortcuts) {
            if (-not (Test-Path -LiteralPath $englishShortcut -PathType Leaf)) {
              throw "English shortcut is missing after language update: $englishShortcut"
            }
            $shortcutTarget = $shortcutShell.CreateShortcut($englishShortcut).TargetPath
            if ([IO.Path]::GetFullPath($shortcutTarget) -ne [IO.Path]::GetFullPath($expectedAppPath)) {
              throw "English shortcut target is $shortcutTarget, expected $expectedAppPath"
            }
          }
          foreach ($chineseShortcut in $legacyShortcuts) {
            if (Test-Path -LiteralPath $chineseShortcut) {
              throw "Chinese shortcut remained after English language update: $chineseShortcut"
            }
          }

          $appBinary = $expectedAppPath
          if (-not (Test-Path -LiteralPath $appBinary -PathType Leaf)) {
            throw "Installed app executable is missing from the install root: $appBinary"
          }
          $productVersion = (Get-Item -LiteralPath $appBinary).VersionInfo.ProductVersion
          $expectedVersionPattern = "^$([regex]::Escape($expectedVersion))(?:\.0+)?$"
          if ($productVersion -notmatch $expectedVersionPattern) {
            throw "Installed app version is $productVersion, expected $expectedVersion"
          }

          $nodeBinaries = @(
            Get-ChildItem $installDirectory -Recurse -File -Filter node.exe |
              Where-Object { $_.FullName -match '[\\/]nodejs[\\/]node\.exe$' }
          )
          if ($nodeBinaries.Count -ne 1) {
            throw "Expected one packaged node.exe, found $($nodeBinaries.Count)"
          }
          $nodeRuntime = $nodeBinaries[0].Directory.FullName
          node scripts/verify-node-runtime.mjs $nodeRuntime
          foreach ($launcher in @("npm.cmd", "npx.cmd")) {
            & (Join-Path $nodeRuntime $launcher) --version
            if ($LASTEXITCODE -ne 0) {
              throw "Packaged $launcher exited with code $LASTEXITCODE"
            }
          }

          $backendBinaries = @(
            Get-ChildItem $installDirectory -Recurse -File -Filter suxiaoyou-backend.exe |
              Where-Object { $_.FullName -match '[\\/]backend[\\/]suxiaoyou-backend\.exe$' }
          )
          if ($backendBinaries.Count -ne 1) {
            throw "Expected one packaged suxiaoyou-backend.exe, found $($backendBinaries.Count)"
          }
          node scripts/verify-bundle.mjs $backendBinaries[0].Directory.FullName
          "installed_app=$appBinary" | Out-File `
            -FilePath $env:GITHUB_OUTPUT `
            -Encoding utf8 `
            -Append

      - name: Launch installed Windows desktop and verify clean shutdown
        shell: pwsh
        env:
          WINDOWS_INSTALLED_APP: ${{ steps.install-windows.outputs.installed_app }}
        run: |
          $ErrorActionPreference = "Stop"
          $installedApp = $env:WINDOWS_INSTALLED_APP
          if (-not (Test-Path -LiteralPath $installedApp -PathType Leaf)) {
            throw "Installed Windows desktop is missing: $installedApp"
          }
          node scripts/verify-desktop-lifecycle.mjs `
            --executable $installedApp `
            --work-dir (Join-Path $env:RUNNER_TEMP "suxiaoyou-desktop-lifecycle-windows")
          if ($LASTEXITCODE -ne 0) {
            throw "Installed Windows desktop lifecycle smoke failed with code $LASTEXITCODE"
          }

      - name: Upload Windows lifecycle diagnostics
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: windows-lifecycle-diagnostics-${{ github.run_attempt }}
          path: |
            ${{ runner.temp }}/suxiaoyou-desktop-lifecycle-windows
            ${{ runner.temp }}/suxiaoyou-office-contract-windows
          if-no-files-found: ignore
          retention-days: 30

      - name: Upload Windows artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: windows-${{ github.event_name == 'workflow_dispatch' && 'UNSIGNED-TEST' || 'release' }}
          path: desktop-tauri/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
          retention-days: 1

  build-macos:
    name: Build macOS ${{ matrix.target == 'aarch64-apple-darwin' && 'aarch64' || 'x64' }}
    needs: validate-release
    if: >-
      github.event_name == 'push' ||
      inputs.target == 'macos-aarch64' ||
      inputs.target == 'macos-x64'
    runs-on: ${{ matrix.target == 'aarch64-apple-darwin' && 'macos-14' || 'macos-15-intel' }}
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJSON(github.event_name == 'push' && '["aarch64-apple-darwin","x86_64-apple-darwin"]' || inputs.target == 'macos-aarch64' && '["aarch64-apple-darwin"]' || '["x86_64-apple-darwin"]') }}
    env:
      MACOSX_DEPLOYMENT_TARGET: "11.0"
      BUNDLE_ARCH: ${{ matrix.target == 'aarch64-apple-darwin' && 'arm64' || 'x86_64' }}
      DMG_ARCH: ${{ matrix.target == 'aarch64-apple-darwin' && 'aarch64' || 'x64' }}
      NODE_PLATFORM: ${{ matrix.target == 'aarch64-apple-darwin' && 'Darwin-arm64' || 'Darwin-x86_64' }}
      BACKEND_DIST: dist
      BUILD_CONFIG: ${{ matrix.target == 'aarch64-apple-darwin' && 'src-tauri/build.macos-aarch64.json' || 'src-tauri/build.macos-x64.json' }}
      IS_STABLE_RELEASE: ${{ needs.validate-release.outputs.is_stable }}
      MACOS_ARTIFACT_PROFILE: ${{ needs.validate-release.outputs.macos_artifact_profile }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.28"
          enable-cache: false

      - name: Install portable macOS Python 3.12.13
        shell: bash
        run: |
          set -euo pipefail
          PYTHON_ENV="$RUNNER_TEMP/suxiaoyou-python"
          uv venv --python 3.12.13 --managed-python --seed "$PYTHON_ENV"
          [[ "$("$PYTHON_ENV/bin/python" -c 'import platform; print(platform.machine())')" == "$BUNDLE_ARCH" ]]
          [[ "$("$PYTHON_ENV/bin/python" -c 'import sys; print(".".join(map(str, sys.version_info[:3])))')" == "3.12.13" ]]
          echo "$PYTHON_ENV/bin" >> "$GITHUB_PATH"

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable 2026-06-30
        with:
          toolchain: "1.96.1"
          targets: ${{ matrix.target }}

      - name: Install locked JavaScript dependencies
        run: |
          npm ci
          npm --prefix frontend ci --legacy-peer-deps
          npm --prefix desktop-tauri ci

      - name: Build and sanitize frontend
        run: npm run build:frontend

      - name: Build native backend with locked PyInstaller
        run: |
          python -m pip install --require-hashes --only-binary=cryptography -r backend/requirements.txt
          python -m pip install pyinstaller==6.21.0 pytest==9.1.1 pytest-asyncio==1.4.0
          python -m pytest -q \
            backend/tests/test_tool/test_posix_process.py \
            backend/tests/test_tool/test_sandbox.py \
            backend/tests/test_tool/test_sandbox_self_test.py \
            backend/tests/test_tool/test_bash.py \
            backend/tests/test_tool/test_code_execute.py \
            backend/tests/test_tool/test_code_execute_written_files.py \
            backend/tests/test_tool/test_registry.py
          cd backend
          python -m PyInstaller suxiaoyou.spec --noconfirm --distpath "$BACKEND_DIST" --workpath "build-$BUNDLE_ARCH"

      - name: Verify backend bundle with full smoke
        env:
          VERIFY_BUNDLE_OFFICE_PLATFORM: ${{ matrix.target == 'aarch64-apple-darwin' && 'macos-arm64' || 'macos-x64' }}
        run: node scripts/verify-bundle.mjs "backend/$BACKEND_DIST/suxiaoyou-backend"

      - name: Download verified native Node.js runtime
        run: |
          cd backend
          python scripts/download_node.py --platform "$NODE_PLATFORM"

      - name: Verify bundled Node.js toolchain
        run: node scripts/verify-node-runtime.mjs backend/resources/nodejs

      - name: Build Tauri app for post-copy repair
        run: |
          cd desktop-tauri
          npm exec tauri build -- --target ${{ matrix.target }} --config "$BUILD_CONFIG" --bundles app --no-sign

      - name: Repair Python.framework symlinks
        run: |
          set -euo pipefail
          APP_PATH="desktop-tauri/src-tauri/target/${{ matrix.target }}/release/bundle/macos/苏小有.app"
          BUNDLE_BACKEND="$APP_PATH/Contents/Resources/backend"
          FRAMEWORK="$BUNDLE_BACKEND/_internal/Python.framework"

          if [[ -d "$FRAMEWORK" ]]; then
            VERSION_DIRECTORY="$(find "$FRAMEWORK/Versions" -mindepth 1 -maxdepth 1 -type d ! -name Current -print -quit)"
            if [[ -z "$VERSION_DIRECTORY" ]]; then
              echo "::error::Python.framework has no versioned directory"
              exit 1
            fi
            VERSION_NAME="$(basename "$VERSION_DIRECTORY")"
            rm -rf "$FRAMEWORK/Versions/Current"
            ln -s "$VERSION_NAME" "$FRAMEWORK/Versions/Current"
            for entry in Python Resources Headers; do
              if [[ -e "$VERSION_DIRECTORY/$entry" ]]; then
                rm -rf "$FRAMEWORK/$entry"
                ln -s "Versions/Current/$entry" "$FRAMEWORK/$entry"
              fi
            done
            rm -rf "$FRAMEWORK/_CodeSignature"
          fi

          PYTHON_BINARY="$BUNDLE_BACKEND/_internal/Python"
          if [[ -e "$FRAMEWORK/Versions/Current/Python" ]]; then
            rm -rf "$PYTHON_BINARY"
            ln -s Python.framework/Versions/Current/Python "$PYTHON_BINARY"
          fi

      - name: Verify repaired app before signing
        run: |
          APP_PATH="desktop-tauri/src-tauri/target/${{ matrix.target }}/release/bundle/macos/苏小有.app"
          node scripts/verify-macos-bundle.mjs "$APP_PATH" "$BUNDLE_ARCH" 11.0

      - name: Import Apple certificate and discover signing identity
        id: apple-signing
        if: github.event_name == 'push' && needs.validate-release.outputs.is_stable == 'true'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          CERTIFICATE_PATH="$RUNNER_TEMP/apple-certificate.p12"

          printf '%s' "$APPLE_CERTIFICATE" | base64 --decode > "$CERTIFICATE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"

          SIGNING_IDENTITY="$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" |
            awk -F'"' '$2 ~ /^Developer ID Application:/ { print $2; exit }')"
          if [[ -z "$SIGNING_IDENTITY" ]]; then
            echo "::error::the imported certificate contains no Developer ID Application identity"
            exit 1
          fi
          echo "identity=$SIGNING_IDENTITY" >> "$GITHUB_OUTPUT"

      - name: Sign nested Mach-O files and app
        env:
          DEVELOPER_IDENTITY: ${{ steps.apple-signing.outputs.identity }}
        run: |
          set -euo pipefail
          APP_PATH="desktop-tauri/src-tauri/target/${{ matrix.target }}/release/bundle/macos/苏小有.app"

          if [[ "$IS_STABLE_RELEASE" == "true" ]]; then
            [[ -n "$DEVELOPER_IDENTITY" ]]
            SIGNING_IDENTITY="$DEVELOPER_IDENTITY"
          else
            SIGNING_IDENTITY="-"
          fi

          scripts/sign-macos-app.sh "$APP_PATH" "$SIGNING_IDENTITY"
          APP_SIGNATURE="$RUNNER_TEMP/app-signature-$DMG_ARCH.txt"
          codesign -dv --verbose=4 "$APP_PATH" 2> "$APP_SIGNATURE"
          cat "$APP_SIGNATURE"
          if [[ "$IS_STABLE_RELEASE" == "true" ]]; then
            grep -Fxq "Authority=$SIGNING_IDENTITY" "$APP_SIGNATURE"
          else
            grep -Fxq "Signature=adhoc" "$APP_SIGNATURE"
          fi

      - name: Verify signed app runtime
        run: |
          set -euo pipefail
          APP_PATH="desktop-tauri/src-tauri/target/${{ matrix.target }}/release/bundle/macos/苏小有.app"
          node scripts/verify-macos-bundle.mjs "$APP_PATH" "$BUNDLE_ARCH" 11.0 --verify-signature

      - name: Create final DMG
        run: |
          set -euo pipefail
          APP_PATH="desktop-tauri/src-tauri/target/${{ matrix.target }}/release/bundle/macos/苏小有.app"
          DMG_DIRECTORY="desktop-tauri/src-tauri/target/${{ matrix.target }}/release/bundle/dmg"
          VERSION="$(node -p "require('./package.json').version")"
          DMG_PATH="$DMG_DIRECTORY/suyo_${VERSION}_${DMG_ARCH}.dmg"
          STAGING_DIRECTORY="$(mktemp -d)"
          trap 'rm -rf "$STAGING_DIRECTORY"' EXIT

          mkdir -p "$DMG_DIRECTORY"
          rm -f "$DMG_DIRECTORY"/*.dmg
          ditto "$APP_PATH" "$STAGING_DIRECTORY/苏小有.app"
          ln -s /Applications "$STAGING_DIRECTORY/Applications"

          MAX_HDIUTIL_ATTEMPTS=3
          for (( attempt = 1; attempt <= MAX_HDIUTIL_ATTEMPTS; attempt++ )); do
            rm -f "$DMG_PATH"
            set +e
            hdiutil_output="$(
              hdiutil create -volname "suyo" -srcfolder "$STAGING_DIRECTORY" -fs APFS -ov -format UDZO "$DMG_PATH" 2>&1
            )"
            hdiutil_status=$?
            set -e
            printf '%s\n' "$hdiutil_output"

            if (( hdiutil_status == 0 )); then
              break
            fi

            rm -f "$DMG_PATH"
            if (( hdiutil_status != 1 )) || ! grep -Fqx "hdiutil: create failed - Resource busy" <<< "$hdiutil_output"; then
              echo "::error::hdiutil create failed with a non-transient error (status $hdiutil_status)"
              exit "$hdiutil_status"
            fi
            if (( attempt == MAX_HDIUTIL_ATTEMPTS )); then
              echo "::error::hdiutil create remained busy after $MAX_HDIUTIL_ATTEMPTS attempts"
              exit "$hdiutil_status"
            fi

            retry_delay=$(( attempt * 5 ))
            echo "::warning::hdiutil create was busy on attempt $attempt/$MAX_HDIUTIL_ATTEMPTS; retrying in ${retry_delay}s"
            sleep "$retry_delay"
          done

          [[ -s "$DMG_PATH" ]] || {
            echo "::error::hdiutil create reported success without a non-empty DMG"
            exit 1
          }
          hdiutil verify "$DMG_PATH"

      - name: Sign final DMG
        if: github.event_name == 'push' && needs.validate-release.outputs.is_stable == 'true'
        env:
          SIGNING_IDENTITY: ${{ steps.apple-signing.outputs.identity }}
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          DMG_PATH="desktop-tauri/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/suyo_${VERSION}_${DMG_ARCH}.dmg"
          codesign --force --timestamp --sign "$SIGNING_IDENTITY" "$DMG_PATH"

      - name: Notarize and staple final DMG
        if: github.event_name == 'push' && needs.validate-release.outputs.is_stable == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          VERSION="$(node -p "require('./package.json').version")"
          DMG_PATH="desktop-tauri/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/suyo_${VERSION}_${DMG_ARCH}.dmg"
          xcrun notarytool submit "$DMG_PATH" --apple-id "$APPLE_ID" --password "$APPLE_PASSWORD" --team-id "$APPLE_TEAM_ID" --wait
          xcrun stapler staple "$DMG_PATH"
          xcrun stapler validate "$DMG_PATH"

      - name: Verify official signatures and Gatekeeper
        if: github.event_name == 'push' && needs.validate-release.outputs.is_stable == 'true'
        run: |
          set -euo pipefail
          APP_PATH="desktop-tauri/src-tauri/target/${{ matrix.target }}/release/bundle/macos/苏小有.app"
          VERSION="$(node -p "require('./package.json').version")"
          DMG_PATH="desktop-tauri/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/suyo_${VERSION}_${DMG_ARCH}.dmg"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          codesign --verify --strict --verbose=2 "$DMG_PATH"
          spctl --assess --type open --context context:primary-signature -vv "$DMG_PATH"
          hdiutil verify "$DMG_PATH"

      - name: Verify RC ad-hoc trust boundary
        if: github.event_name == 'push' && needs.validate-release.outputs.is_stable == 'false'
        run: |
          set -euo pipefail
          VERSION="$(node -p "require('./package.json').version")"
          DMG_PATH="desktop-tauri/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/suyo_${VERSION}_${DMG_ARCH}.dmg"
          if codesign --verify --strict --verbose=2 "$DMG_PATH"; then
            echo "::error::RC DMG unexpectedly has a code signature"
            exit 1
          fi
          if xcrun stapler validate "$DMG_PATH"; then
            echo "::error::RC DMG unexpectedly has a stapled notarization ticket"
            exit 1
          fi

      - name: Verify final DMG contents
        env:
          VERIFY_BUNDLE_OFFICE_PLATFORM: ${{ matrix.target == 'aarch64-apple-darwin' && 'macos-arm64' || 'macos-x64' }}
          VERIFY_BUNDLE_OFFICE_REPORT: ${{ runner.temp }}/suxiaoyou-office-contract-macos-${{ env.DMG_ARCH }}/office-contract.json
        run: |
          set -euo pipefail
          VERSION="$(node -p "require('./package.json').version")"
          DMG_PATH="desktop-tauri/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/suyo_${VERSION}_${DMG_ARCH}.dmg"
          MOUNT_DIRECTORY="$(mktemp -d)"
          INSTALL_TEST_DIRECTORY="$(mktemp -d)"
          cleanup() {
            hdiutil detach "$MOUNT_DIRECTORY" >/dev/null 2>&1 || true
            rm -rf "$MOUNT_DIRECTORY" "$INSTALL_TEST_DIRECTORY"
          }
          trap cleanup EXIT

          hdiutil verify "$DMG_PATH"
          hdiutil attach -nobrowse -readonly -mountpoint "$MOUNT_DIRECTORY" "$DMG_PATH"
          node scripts/verify-macos-bundle.mjs "$MOUNT_DIRECTORY/苏小有.app" "$BUNDLE_ARCH" 11.0 --verify-signature
          ditto "$MOUNT_DIRECTORY/苏小有.app" "$INSTALL_TEST_DIRECTORY/苏小有.app"
          node scripts/verify-macos-bundle.mjs "$INSTALL_TEST_DIRECTORY/苏小有.app" "$BUNDLE_ARCH" 11.0 --verify-signature
          APP_EXECUTABLE="$(plutil -extract CFBundleExecutable raw "$INSTALL_TEST_DIRECTORY/苏小有.app/Contents/Info.plist")"
          node scripts/verify-desktop-lifecycle.mjs \
            --executable "$INSTALL_TEST_DIRECTORY/苏小有.app/Contents/MacOS/$APP_EXECUTABLE" \
            --work-dir "$RUNNER_TEMP/suxiaoyou-desktop-lifecycle-macos-$DMG_ARCH"
          hdiutil detach "$MOUNT_DIRECTORY"
          trap - EXIT
          rm -rf "$MOUNT_DIRECTORY" "$INSTALL_TEST_DIRECTORY"

      - name: Remove temporary Apple keychain
        if: always() && github.event_name == 'push' && needs.validate-release.outputs.is_stable == 'true'
        run: |
          security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db" 2>/dev/null || true
          rm -f "$RUNNER_TEMP/apple-certificate.p12"

      - name: Upload macOS lifecycle diagnostics
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: macos-${{ env.DMG_ARCH }}-lifecycle-diagnostics-${{ github.run_attempt }}
          path: |
            ${{ runner.temp }}/suxiaoyou-desktop-lifecycle-macos-${{ env.DMG_ARCH }}
            ${{ runner.temp }}/suxiaoyou-office-contract-macos-${{ env.DMG_ARCH }}
          if-no-files-found: ignore
          retention-days: 30

      - name: Upload macOS artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: macos-${{ env.DMG_ARCH }}-${{ env.MACOS_ARTIFACT_PROFILE }}
          path: desktop-tauri/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
          if-no-files-found: error
          retention-days: 1

  build-linux:
    name: Build Linux ${{ matrix.target == 'linux-arm64' && 'ARM64' || 'x64' }}
    needs: validate-release
    if: github.event_name == 'push' || startsWith(inputs.target, 'linux-')
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJSON(github.event_name == 'push' && '["linux-x64","linux-arm64"]' || inputs.target == 'linux-arm64' && '["linux-arm64"]' || '["linux-x64"]') }}
    runs-on: ${{ matrix.target == 'linux-arm64' && 'ubuntu-22.04-arm' || 'ubuntu-22.04' }}
    env:
      BUILD_CONFIG: ${{ matrix.target == 'linux-arm64' && 'src-tauri/build.linux-arm64.json' || 'src-tauri/build.linux-x64.json' }}
      EXPECTED_DEB_ARCH: ${{ matrix.target == 'linux-arm64' && 'arm64' || 'amd64' }}
      EXPECTED_RPM_ARCH: ${{ matrix.target == 'linux-arm64' && 'aarch64' || 'x86_64' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bubblewrap libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev rpm cpio file patchelf build-essential curl wget libssl-dev libgtk-3-dev libsoup-3.0-dev libxdo-dev xvfb dbus-x11

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12.13"

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable 2026-06-30
        with:
          toolchain: "1.96.1"

      - name: Install locked JavaScript dependencies
        run: |
          npm ci
          npm --prefix frontend ci --legacy-peer-deps
          npm --prefix desktop-tauri ci

      - name: Build and sanitize frontend
        run: npm run build:frontend

      - name: Build backend with locked PyInstaller
        run: |
          python -m pip install --require-hashes --only-binary=cryptography -r backend/requirements.txt
          python -m pip install pyinstaller==6.21.0
          cd backend
          python -m PyInstaller suxiaoyou.spec --noconfirm

      - name: Verify backend bundle
        env:
          VERIFY_BUNDLE_OFFICE_PLATFORM: ${{ matrix.target }}
        run: node scripts/verify-bundle.mjs backend/dist/suxiaoyou-backend

      - name: Download verified Node.js runtime
        run: |
          cd backend
          python scripts/download_node.py

      - name: Verify bundled Node.js toolchain
        run: node scripts/verify-node-runtime.mjs backend/resources/nodejs

      - name: Build Tauri Linux installers
        run: |
          cd desktop-tauri
          npm exec tauri build -- --config "$BUILD_CONFIG" --no-sign

      - name: Verify Linux installers and packaged Node.js toolchain
        env:
          VERIFY_BUNDLE_OFFICE_PLATFORM: ${{ matrix.target }}
          VERIFY_BUNDLE_OFFICE_REPORT: ${{ runner.temp }}/suxiaoyou-office-contract-${{ matrix.target }}/office-contract.json
        run: |
          set -euo pipefail
          shopt -s nullglob
          debs=(desktop-tauri/src-tauri/target/release/bundle/deb/*.deb)
          rpms=(desktop-tauri/src-tauri/target/release/bundle/rpm/*.rpm)
          if (( ${#debs[@]} != 1 )); then
            printf '::error::Expected exactly one DEB installer, found %d: %s\n' "${#debs[@]}" "${debs[*]-}"
            exit 1
          fi
          if (( ${#rpms[@]} != 1 )); then
            printf '::error::Expected exactly one RPM installer, found %d: %s\n' "${#rpms[@]}" "${rpms[*]-}"
            exit 1
          fi
          printf 'Verifying DEB %s and RPM %s\n' "${debs[0]}" "${rpms[0]}"

          VERSION="$(node -p "require('./package.json').version")"
          EXPECTED_PACKAGE="suxiaoyou"
          DEB_PACKAGE="$(dpkg-deb -f "${debs[0]}" Package)"
          DEB_VERSION="$(dpkg-deb -f "${debs[0]}" Version)"
          DEB_ARCH="$(dpkg-deb -f "${debs[0]}" Architecture)"
          DEB_DEPENDS="$(dpkg-deb -f "${debs[0]}" Depends)"
          RPM_PACKAGE="$(rpm -qp --queryformat '%{NAME}' "${rpms[0]}")"
          RPM_VERSION="$(rpm -qp --queryformat '%{VERSION}' "${rpms[0]}")"
          RPM_ARCH="$(rpm -qp --queryformat '%{ARCH}' "${rpms[0]}")"
          RPM_REQUIRES="$(rpm -qp --requires "${rpms[0]}")"
          [[ "$DEB_PACKAGE" == "$EXPECTED_PACKAGE" ]] || {
            echo "::error::DEB package is $DEB_PACKAGE, expected $EXPECTED_PACKAGE"
            exit 1
          }
          [[ "$RPM_PACKAGE" == "$EXPECTED_PACKAGE" ]] || {
            echo "::error::RPM package is $RPM_PACKAGE, expected $EXPECTED_PACKAGE"
            exit 1
          }
          [[ "$DEB_VERSION" == "$VERSION" ]] || {
            echo "::error::DEB version is $DEB_VERSION, expected $VERSION"
            exit 1
          }
          [[ "$DEB_ARCH" == "$EXPECTED_DEB_ARCH" ]] || {
            echo "::error::DEB architecture is $DEB_ARCH, expected $EXPECTED_DEB_ARCH"
            exit 1
          }
          [[ "$RPM_VERSION" == "$VERSION" ]] || {
            echo "::error::RPM version is $RPM_VERSION, expected $VERSION"
            exit 1
          }
          [[ "$RPM_ARCH" == "$EXPECTED_RPM_ARCH" ]] || {
            echo "::error::RPM architecture is $RPM_ARCH, expected $EXPECTED_RPM_ARCH"
            exit 1
          }
          grep -Eq '(^|, )libxdo3([, (]|$)' <<< "$DEB_DEPENDS" || {
            echo "::error::DEB runtime dependencies do not include libxdo3: $DEB_DEPENDS"
            exit 1
          }
          grep -Eq '(^|, )bubblewrap([, (]|$)' <<< "$DEB_DEPENDS" || {
            echo "::error::DEB runtime dependencies do not include bubblewrap: $DEB_DEPENDS"
            exit 1
          }
          grep -qx 'xdotool' <<< "$RPM_REQUIRES" || {
            printf '::error::RPM runtime dependencies do not include xdotool:\n%s\n' "$RPM_REQUIRES"
            exit 1
          }
          grep -qx 'bubblewrap' <<< "$RPM_REQUIRES" || {
            printf '::error::RPM runtime dependencies do not include bubblewrap:\n%s\n' "$RPM_REQUIRES"
            exit 1
          }

          DEB_ROOT="$RUNNER_TEMP/suxiaoyou-deb-root"
          RPM_ROOT="$RUNNER_TEMP/suxiaoyou-rpm-root"
          RPM_PAYLOAD="$RUNNER_TEMP/suxiaoyou-rpm-payload.cpio"
          RPM_CPIO_LIST="$RUNNER_TEMP/suxiaoyou-rpm-cpio.list"
          RPM_QUERY_LIST="$RUNNER_TEMP/suxiaoyou-rpm-query.list"
          rm -rf "$DEB_ROOT" "$RPM_ROOT"
          rm -f "$RPM_PAYLOAD" "$RPM_CPIO_LIST" "$RPM_QUERY_LIST"
          mkdir -p "$DEB_ROOT" "$RPM_ROOT"
          dpkg-deb -x "${debs[0]}" "$DEB_ROOT"
          rpm -K "${rpms[0]}"

          # Tauri RPMs do not currently carry ARCHIVESIZE/LONGARCHIVESIZE.
          # Ubuntu 22.04's rpm2cpio 4.17 therefore copies the complete payload
          # but returns 1 after comparing its byte count with a missing header
          # value.  Capture that documented status, then independently require
          # valid RPM digests, a complete CPIO index, matching package entry
          # counts, successful extraction, and executable installed runtimes.
          set +e
          rpm2cpio "${rpms[0]}" > "$RPM_PAYLOAD"
          rpm2cpio_status=$?
          set -e
          if (( rpm2cpio_status != 0 && rpm2cpio_status != 1 )); then
            printf '::error::rpm2cpio exited with unexpected status %d\n' "$rpm2cpio_status"
            exit 1
          fi
          if (( rpm2cpio_status == 1 )); then
            echo '::warning::rpm2cpio returned 1 for a Tauri RPM without an archive-size header; validating the emitted payload independently'
          fi
          if [[ ! -s "$RPM_PAYLOAD" ]]; then
            echo '::error::rpm2cpio produced an empty payload'
            exit 1
          fi
          cpio -it --quiet < "$RPM_PAYLOAD" > "$RPM_CPIO_LIST"
          rpm -qpl "${rpms[0]}" > "$RPM_QUERY_LIST"
          cpio_entries="$(wc -l < "$RPM_CPIO_LIST")"
          rpm_entries="$(wc -l < "$RPM_QUERY_LIST")"
          if (( cpio_entries == 0 || cpio_entries != rpm_entries )); then
            printf '::error::RPM/CPIO entry-count mismatch: rpm=%d cpio=%d\n' "$rpm_entries" "$cpio_entries"
            exit 1
          fi
          printf 'Validated RPM payload: %d package entries, %s bytes\n' "$cpio_entries" "$(stat -c %s "$RPM_PAYLOAD")"
          (cd "$RPM_ROOT" && cpio -idm --quiet < "$RPM_PAYLOAD")

          for root in "$DEB_ROOT" "$RPM_ROOT"; do
            printf 'Inspecting extracted installer root: %s\n' "$root"
            mapfile -t node_binaries < <(find -L "$root" -type f -path '*/nodejs/bin/node')
            if (( ${#node_binaries[@]} != 1 )); then
              printf '::error::Expected exactly one packaged Node binary under %s, found %d\n' "$root" "${#node_binaries[@]}"
              printf '%s\n' "${node_binaries[@]-}"
              find "$root" -path '*nodejs*' \( -type f -o -type l \) -print | sort
              exit 1
            fi
            printf 'Packaged Node binary: %s\n' "${node_binaries[0]}"
            runtime="$(dirname "$(dirname "${node_binaries[0]}")")"
            node scripts/verify-node-runtime.mjs "$runtime"

            mapfile -t backend_binaries < <(find -L "$root" -type f -path '*/backend/suxiaoyou-backend')
            if (( ${#backend_binaries[@]} != 1 )); then
              printf '::error::Expected exactly one packaged backend under %s, found %d\n' "$root" "${#backend_binaries[@]}"
              printf '%s\n' "${backend_binaries[@]-}"
              find "$root" -path '*backend*' \( -type f -o -type l \) -print | sort
              exit 1
            fi
            printf 'Packaged backend binary: %s\n' "${backend_binaries[0]}"
            node scripts/verify-bundle.mjs "$(dirname "${backend_binaries[0]}")"
          done
          rm -f "$RPM_PAYLOAD" "$RPM_CPIO_LIST" "$RPM_QUERY_LIST"

      - name: Install Linux packages and verify desktop lifecycle
        run: |
          set -euo pipefail
          shopt -s nullglob
          debs=(desktop-tauri/src-tauri/target/release/bundle/deb/*.deb)
          rpms=(desktop-tauri/src-tauri/target/release/bundle/rpm/*.rpm)
          [[ ${#debs[@]} -eq 1 && ${#rpms[@]} -eq 1 ]]

          DEB_INSPECT_ROOT="$RUNNER_TEMP/suxiaoyou-deb-launcher"
          RPM_INSPECT_ROOT="$RUNNER_TEMP/suxiaoyou-rpm-launcher"
          rm -rf "$DEB_INSPECT_ROOT" "$RPM_INSPECT_ROOT"
          mkdir -p "$DEB_INSPECT_ROOT" "$RPM_INSPECT_ROOT"
          dpkg-deb -x "${debs[0]}" "$DEB_INSPECT_ROOT"
          set +e
          rpm2cpio "${rpms[0]}" > "$RUNNER_TEMP/suxiaoyou-lifecycle-rpm.cpio"
          rpm2cpio_status=$?
          set -e
          if (( rpm2cpio_status != 0 && rpm2cpio_status != 1 )); then
            echo "::error::rpm2cpio exited with unexpected status $rpm2cpio_status during lifecycle install"
            exit 1
          fi
          (cd "$RPM_INSPECT_ROOT" && cpio -idm --quiet < "$RUNNER_TEMP/suxiaoyou-lifecycle-rpm.cpio")

          mapfile -d '' -t deb_launchers < <(
            find "$DEB_INSPECT_ROOT/usr/bin" -mindepth 1 -maxdepth 1 \( -type f -o -type l \) -print0
          )
          mapfile -d '' -t rpm_launchers < <(
            find "$RPM_INSPECT_ROOT/usr/bin" -mindepth 1 -maxdepth 1 \( -type f -o -type l \) -print0
          )
          if (( ${#deb_launchers[@]} != 1 || ${#rpm_launchers[@]} != 1 )); then
            echo "::error::Expected one desktop launcher in each Linux package (deb=${#deb_launchers[@]}, rpm=${#rpm_launchers[@]})"
            exit 1
          fi
          DEB_LAUNCHER="${deb_launchers[0]#"$DEB_INSPECT_ROOT"}"
          RPM_LAUNCHER="${rpm_launchers[0]#"$RPM_INSPECT_ROOT"}"
          DEB_PACKAGE="$(dpkg-deb -f "${debs[0]}" Package)"
          RPM_PACKAGE="$(rpm -qp --queryformat '%{NAME}' "${rpms[0]}")"
          deb_installed=0
          rpm_installed=0
          cleanup_packages() {
            if (( rpm_installed )); then sudo rpm -e "$RPM_PACKAGE" >/dev/null 2>&1 || true; fi
            if (( deb_installed )); then sudo dpkg --purge "$DEB_PACKAGE" >/dev/null 2>&1 || true; fi
            rm -f "$RUNNER_TEMP/suxiaoyou-lifecycle-rpm.cpio"
          }
          trap cleanup_packages EXIT

          sudo dpkg -i "${debs[0]}"
          deb_installed=1
          [[ -x "$DEB_LAUNCHER" ]]
          xvfb-run -a dbus-run-session -- \
            node scripts/verify-desktop-lifecycle.mjs \
              --executable "$DEB_LAUNCHER" \
              --work-dir "$RUNNER_TEMP/suxiaoyou-desktop-lifecycle-linux-deb"
          sudo dpkg --purge "$DEB_PACKAGE"
          deb_installed=0

          sudo rpm -i --nodeps "${rpms[0]}"
          rpm_installed=1
          [[ -x "$RPM_LAUNCHER" ]]
          xvfb-run -a dbus-run-session -- \
            node scripts/verify-desktop-lifecycle.mjs \
              --executable "$RPM_LAUNCHER" \
              --work-dir "$RUNNER_TEMP/suxiaoyou-desktop-lifecycle-linux-rpm"
          sudo rpm -e "$RPM_PACKAGE"
          rpm_installed=0
          trap - EXIT
          cleanup_packages

      - name: Upload Linux lifecycle diagnostics
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.target }}-lifecycle-diagnostics-${{ github.run_attempt }}
          path: |
            ${{ runner.temp }}/suxiaoyou-desktop-lifecycle-linux-*
            ${{ runner.temp }}/suxiaoyou-office-contract-${{ matrix.target }}
          if-no-files-found: ignore
          retention-days: 30

      - name: Upload Linux artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.target }}-${{ github.event_name == 'workflow_dispatch' && 'UNSIGNED-TEST' || 'release' }}
          path: |
            desktop-tauri/src-tauri/target/release/bundle/deb/*.deb
            desktop-tauri/src-tauri/target/release/bundle/rpm/*.rpm
          if-no-files-found: error
          retention-days: 1

  publish:
    name: Prepare GitHub Release
    needs: [validate-release, build-windows, build-macos, build-linux]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    env:
      APP_VERSION: ${{ needs.validate-release.outputs.app_version }}
      RELEASE_VERSION: ${{ needs.validate-release.outputs.release_version }}
      RELEASE_CHANNEL: ${{ needs.validate-release.outputs.release_channel }}
      MACOS_ARTIFACT_PROFILE: ${{ needs.validate-release.outputs.macos_artifact_profile }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f -print | sort

      - name: Verify native Office compatibility evidence
        run: |
          set -euo pipefail
          RELEASE_COMMIT="$(git rev-parse 'HEAD^{commit}')"
          node scripts/office-contract-evidence.mjs \
            aggregate \
            artifacts \
            "$RELEASE_COMMIT" \
            "$GITHUB_REF_NAME" \
            OFFICE-COMPATIBILITY.json

      - name: Verify and summarize v1 integration evidence
        run: |
          set -euo pipefail
          mapfile -t evidence_directories < <(
            find artifacts -mindepth 1 -maxdepth 1 -type d \
              -name 'v1-integration-evidence-*' -print
          )
          if [[ ${#evidence_directories[@]} -ne 1 ]]; then
            echo "::error::expected one v1 integration evidence artifact, found ${#evidence_directories[@]}"
            exit 1
          fi
          RELEASE_COMMIT="$(git rev-parse 'HEAD^{commit}')"
          if [[ "$RELEASE_CHANNEL" == "prerelease" ]]; then
            INTEGRATION_MODE="rc"
          else
            INTEGRATION_MODE="ga"
          fi
          node scripts/v1-real-integration-gates.mjs verify \
            --mode "$INTEGRATION_MODE" \
            --release-tag "$GITHUB_REF_NAME" \
            --commit "$RELEASE_COMMIT" \
            --evidence-dir "${evidence_directories[0]}"
          node scripts/v1-real-integration-gates.mjs summarize \
            --mode "$INTEGRATION_MODE" \
            --release-tag "$GITHUB_REF_NAME" \
            --commit "$RELEASE_COMMIT" \
            --evidence-dir "${evidence_directories[0]}" \
            --output INTEGRATION-CONTRACTS.json

      - name: Verify artifact completeness
        run: |
          set -euo pipefail
          require_one() {
            local label="$1"
            local directory="$2"
            local pattern="$3"
            local matches=()
            while IFS= read -r -d '' path; do
              matches+=("$path")
            done < <(find "$directory" -type f -name "$pattern" -print0)
            if [[ ${#matches[@]} -ne 1 ]]; then
              echo "::error::expected exactly one $label in $directory, found ${#matches[@]}"
              exit 1
            fi
          }

          require_one "Windows NSIS installer (*.exe)" artifacts/windows-release "*.exe"
          require_one "macOS Apple Silicon installer (*.dmg)" "artifacts/macos-aarch64-$MACOS_ARTIFACT_PROFILE" "*.dmg"
          require_one "macOS Intel installer (*.dmg)" "artifacts/macos-x64-$MACOS_ARTIFACT_PROFILE" "*.dmg"
          require_one "Linux Debian installer (*.deb)" artifacts/linux-x64-release "*.deb"
          require_one "Linux RPM installer (*.rpm)" artifacts/linux-x64-release "*.rpm"
          require_one "Linux ARM64 Debian installer (*.deb)" artifacts/linux-arm64-release "*.deb"
          require_one "Linux ARM64 RPM installer (*.rpm)" artifacts/linux-arm64-release "*.rpm"
          require_one "Windows NSIS installer for app $APP_VERSION" artifacts/windows-release "*${APP_VERSION}*.exe"
          require_one "macOS Apple Silicon installer for app $APP_VERSION" "artifacts/macos-aarch64-$MACOS_ARTIFACT_PROFILE" "*${APP_VERSION}*_aarch64.dmg"
          require_one "macOS Intel installer for app $APP_VERSION" "artifacts/macos-x64-$MACOS_ARTIFACT_PROFILE" "*${APP_VERSION}*_x64.dmg"
          require_one "Linux Debian installer for app $APP_VERSION" artifacts/linux-x64-release "*${APP_VERSION}*.deb"
          require_one "Linux RPM installer for app $APP_VERSION" artifacts/linux-x64-release "*${APP_VERSION}*.rpm"
          require_one "Linux ARM64 Debian installer for app $APP_VERSION" artifacts/linux-arm64-release "*${APP_VERSION}*.deb"
          require_one "Linux ARM64 RPM installer for app $APP_VERSION" artifacts/linux-arm64-release "*${APP_VERSION}*.rpm"
          require_one "Rust cargo-audit summary" artifacts/cargo-audit-summary "cargo-audit-summary.json"

      - name: Validate and render Rust audit disclosure
        run: |
          set -euo pipefail
          SUMMARY="artifacts/cargo-audit-summary/cargo-audit-summary.json"
          node scripts/cargo-audit-summary.mjs verify "$SUMMARY"
          node scripts/cargo-audit-summary.mjs assert-clean "$SUMMARY"
          node scripts/cargo-audit-summary.mjs markdown "$SUMMARY" RUST-AUDIT.md

      - name: Stage release asset names
        run: |
          set -euo pipefail
          case "$RELEASE_CHANNEL" in
            stable) MACOS_TRUST_SUFFIX="" ;;
            prerelease) MACOS_TRUST_SUFFIX="-ADHOC-NOT-NOTARIZED" ;;
            *) echo "::error::unsupported publish channel $RELEASE_CHANNEL"; exit 1 ;;
          esac
          rm -rf release-assets
          mkdir release-assets
          copy_one() {
            local directory="$1"
            local pattern="$2"
            local destination="$3"
            local source
            source="$(find "$directory" -type f -name "$pattern" -print -quit)"
            [[ -n "$source" ]]
            cp -- "$source" "release-assets/$destination"
          }
          copy_one artifacts/windows-release "*.exe" "suyo-${RELEASE_VERSION}-windows-x64-setup.exe"
          copy_one "artifacts/macos-aarch64-$MACOS_ARTIFACT_PROFILE" "*.dmg" "suyo-${RELEASE_VERSION}-macos-aarch64${MACOS_TRUST_SUFFIX}.dmg"
          copy_one "artifacts/macos-x64-$MACOS_ARTIFACT_PROFILE" "*.dmg" "suyo-${RELEASE_VERSION}-macos-x64${MACOS_TRUST_SUFFIX}.dmg"
          copy_one artifacts/linux-x64-release "*.deb" "suyo-${RELEASE_VERSION}-linux-amd64.deb"
          copy_one artifacts/linux-x64-release "*.rpm" "suyo-${RELEASE_VERSION}-linux-x86_64.rpm"
          copy_one artifacts/linux-arm64-release "*.deb" "suyo-${RELEASE_VERSION}-linux-arm64.deb"
          copy_one artifacts/linux-arm64-release "*.rpm" "suyo-${RELEASE_VERSION}-linux-aarch64.rpm"
          [[ "$(find release-assets -maxdepth 1 -type f | wc -l | tr -d ' ')" == "7" ]]

      - name: Generate SHA-256 checksums
        run: node scripts/generate-checksums.mjs release-assets CHECKSUMS.md

      - name: Generate scorecard-ready native package evidence
        run: |
          set -euo pipefail
          RELEASE_COMMIT="$(git rev-parse 'HEAD^{commit}')"
          node scripts/native-package-evidence.mjs \
            aggregate \
            release-assets \
            artifacts \
            CHECKSUMS.md \
            "$RELEASE_COMMIT" \
            "$GITHUB_REF_NAME" \
            "$RELEASE_CHANNEL" \
            PACKAGE-LIFECYCLE.json

      - name: Retain native package evidence for RC scorecard
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: v1-native-package-evidence-${{ github.run_attempt }}
          path: PACKAGE-LIFECYCLE.json
          if-no-files-found: error
          retention-days: 30

      - name: Generate and verify manual-download release manifest
        run: |
          RELEASE_COMMIT="$(git rev-parse 'HEAD^{commit}')"
          node scripts/generate-release-manifest.mjs \
            release-assets \
            "$GITHUB_REF_NAME" \
            "$RELEASE_COMMIT" \
            "$GITHUB_REPOSITORY" \
            CHECKSUMS.md \
            release-manifest.json
          node scripts/verify-release-manifest.mjs \
            release-manifest.json \
            release-assets \
            CHECKSUMS.md \
            "$GITHUB_REF_NAME" \
            "$RELEASE_COMMIT" \
            "$GITHUB_REPOSITORY"

      - name: Record installer trust status
        run: |
          {
            if [[ "$RELEASE_CHANNEL" == "prerelease" ]]; then
              cat <<EOF
          > [!WARNING]
          > 这是 v${RELEASE_VERSION} 候选测试版，不是正式 v${APP_VERSION}。macOS 应用仅使用 ad-hoc 临时签名，DMG 未使用 Developer ID 签名、未经过 Apple 公证，Gatekeeper 可能拦截。

          候选版安装包内部版本仍为 ${APP_VERSION}。未来安装正式 v${APP_VERSION} 时，系统或包管理器可能不会将其识别为升级；请先卸载候选版，或显式执行覆盖安装。

          EOF
            fi
            cat <<'EOF'
          ## 版本重点

          - 文件与 Office：DOCX/XLSX/PPTX 的受限创建和编辑、写前版本、恢复与受守卫的目标文件提交由五个原生平台分别验证。
          - 目标模式：目标、阶段进展和完成摘要保留在对话中，旧问答不再因目标状态消失；移除累计 Token 分解与累计上下文用量展示。
          - 对话体验：修复侧栏右键重命名失焦；简化多轮导航短横，移除总轮数按钮和“第 x 轮”文字。
          - 凭据：改为按需激活与聚合保存，覆盖环境变量引用解析及同进程重复请求回归。

          ## 已知边界

          - Windows Bash/Python 使用 Job Object 回收进程树，但直接作用于已批准工作区，不提供文件系统或网络隔离，失败可能留下改动；不得将其理解为 Linux/macOS 的私有事务执行。

          EOF
            if [[ "$RELEASE_CHANNEL" == "prerelease" ]]; then
              printf '%s\n\n' '- 公开 RC 前仍需在同一候选包上完成 macOS 旧凭据覆盖升级、首次实际请求至多一次系统密码提示，以及 20 人、200 个核心任务、连续 7 天的受控 Beta 计分卡；证据未完成时本 Release 保持草稿。'
            fi
            cat <<'EOF'

          ## 安装包信任与验证状态

          - Windows NSIS：安装界面支持 English 与简体中文并提供语言选择；当前未配置 Authenticode 代码签名；已在原生 Windows runner 静默安装并验证内置运行时。
          - Linux x64/ARM64 DEB/RPM：当前未配置仓库签名；已在对应原生 runner 验证包元数据、完整解包、内置运行时和桌面生命周期。
          - 七个安装包（Windows x64、macOS arm64/x64、Linux x64/ARM64）均来自同一提交并通过统一前端功能门禁；生成文件菜单的 macOS、Windows 与 Linux 能力矩阵已执行回归。
          - 五个原生目标均由冻结后端完成 DOCX/XLSX/PPTX 的创建、有限编辑、独立重开、原子安装和写前版本快照验证；机器可复核结果见 `OFFICE-COMPATIBILITY.json`。
          - 腾讯文档与 SiliconFlow 集成证据均绑定同一 tag/commit 且无跳过；RC 验证无凭据合同，稳定版还必须通过腾讯文档可逆写入和 SiliconFlow 真实工具闭环。manifest 与日志摘要见 `INTEGRATION-CONTRACTS.json`。
          - Release 草稿固定包含十一个资产：七个安装包，以及 `CHECKSUMS.md`、`release-manifest.json`、`OFFICE-COMPATIBILITY.json`、`INTEGRATION-CONTRACTS.json`。
          - 所有安装包均由本次 tag 的隔离 runner 构建；以下 SHA-256 是下载后完整性校验依据。
          - `release-manifest.json` 仅提供可信版本发现与手动下载链接，不声明或执行自动更新。

          EOF
            if [[ "$RELEASE_CHANNEL" == "stable" ]]; then
              printf '%s\n\n' '- macOS Apple Silicon 与 Intel：Developer ID 签名，已通过 Apple 公证并 stapled。'
            else
              printf '%s\n\n' '- macOS Apple Silicon 与 Intel：应用仅使用 ad-hoc 临时签名；DMG 未使用 Developer ID 签名、未经过 Apple 公证，也没有 stapled ticket。'
            fi
            cat RUST-AUDIT.md
            cat CHECKSUMS.md
          } > RELEASE-BODY.md

      - name: Prepare GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          draft: true
          prerelease: ${{ needs.validate-release.outputs.release_channel == 'prerelease' }}
          make_latest: false
          generate_release_notes: true
          body_path: RELEASE-BODY.md
          append_body: true
          files: |
            release-assets/*
            CHECKSUMS.md
            release-manifest.json
            OFFICE-COMPATIBILITY.json
            INTEGRATION-CONTRACTS.json
