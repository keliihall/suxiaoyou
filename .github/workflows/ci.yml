name: Tests & Type Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12.13"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libcairo2-dev pkg-config

      - name: Install dependencies
        run: |
          python -m pip install --require-hashes -r requirements.txt
          python -m pip install -e . --no-deps
          python -m pip install pytest==9.1.1 pytest-asyncio==1.4.0
          python -m pip install uv==0.11.28
          python -m pip check

      - name: Validate universal backend lock
        run: |
          for target in \
            x86_64-pc-windows-msvc \
            aarch64-apple-darwin \
            x86_64-apple-darwin \
            aarch64-manylinux_2_28 \
            x86_64-manylinux_2_28
          do
            uv pip install \
              --system \
              --python python \
              --dry-run \
              --python-version 3.12 \
              --python-platform "$target" \
              --require-hashes \
              --only-binary=:all: \
              -r requirements.txt
          done

      - name: Run tests
        run: pytest -x --tb=short -q --ignore=tests/test_tool/test_code_execute.py

  frontend:
    name: Frontend Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Sanitizer tests
        run: node --test ../scripts/sanitize-build-brand.test.mjs

      - name: Release workflow tests
        working-directory: .
        run: |
          node --test \
            scripts/bump-version.test.mjs \
            scripts/generate-checksums.test.mjs \
            scripts/release-manifest.test.mjs \
            scripts/release-metadata.test.mjs \
            scripts/release-workflow.test.mjs \
            scripts/verify-desktop-lifecycle.test.mjs \
            scripts/verify-macos-bundle.test.mjs \
            scripts/verify-node-runtime.test.mjs \
            scripts/workflow-security.test.mjs

      - name: Verify synchronized release metadata
        working-directory: .
        run: node scripts/release-metadata.mjs "$(node -p "require('./package.json').version")"

      - name: Unit tests
        run: node --test tests/unit/*.test.ts

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

  rust:
    name: Rust Tests & Clippy
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: desktop-tauri/src-tauri
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Tauri build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            libssl-dev \
            pkg-config

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable 2026-06-30
        with:
          toolchain: "1.96.1"
          components: clippy

      - name: Prepare placeholder Tauri resources for Rust validation
        run: |
          mkdir -p \
            ../../backend/dist/suxiaoyou-backend \
            ../../backend/resources/nodejs

      - name: Run Rust tests
        run: cargo test --locked

      - name: Deny Clippy warnings
        run: cargo clippy --locked --all-targets -- -D warnings

  playwright:
    name: Chromium UI Regression
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run Chromium UI suite
        env:
          SUXIAOYOU_UI_WORKERS: "2"
        run: npm run test:ui:core

      - name: Upload Playwright diagnostics
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: |
            frontend/playwright-report
            frontend/test-results
          if-no-files-found: ignore
          retention-days: 7
