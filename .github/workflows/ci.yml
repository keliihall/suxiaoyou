name: Tests & Type Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12.13"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libcairo2-dev pkg-config

      - name: Install dependencies
        run: |
          python -m pip install --require-hashes -r requirements.txt
          python -m pip install -e . --no-deps
          python -m pip install pytest==9.1.1 pytest-asyncio==1.4.0
          python -m pip install uv==0.11.28
          python -m pip check

      - name: Validate universal backend lock
        run: |
          for target in \
            x86_64-pc-windows-msvc \
            aarch64-apple-darwin \
            x86_64-apple-darwin \
            x86_64-manylinux_2_28
          do
            uv pip install \
              --system \
              --python python \
              --dry-run \
              --python-version 3.12 \
              --python-platform "$target" \
              --require-hashes \
              --only-binary=:all: \
              -r requirements.txt
          done

      - name: Run tests
        run: pytest -x --tb=short -q --ignore=tests/test_tool/test_code_execute.py

  frontend:
    name: Frontend Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Sanitizer tests
        run: node --test ../scripts/sanitize-build-brand.test.mjs

      - name: Release workflow tests
        run: node --test ../scripts/release-workflow.test.mjs ../scripts/verify-macos-bundle.test.mjs ../scripts/verify-node-runtime.test.mjs

      - name: Unit tests
        run: node --test tests/unit/*.test.ts

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint
